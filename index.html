<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>לידים</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0d14; --card: #16161f; --card2: #1e1e2a;
  --accent: #5b8ef0; --green: #27c17a; --red: #e05252;
  --text: #eeeef8; --muted: #7777aa; --border: #252535;
}
body { font-family: -apple-system,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header { background:var(--card); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:800; color:var(--accent); }
.header-right { display:flex; gap:8px; align-items:center; }

.btn { padding:14px 18px; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; width:100%; transition:all 0.12s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn:active { transform:scale(0.96); }
.btn-save { background:var(--accent); color:#fff; }
.btn-skip { background:var(--card2); color:var(--muted); border:1px solid var(--border); }

#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:30px; gap:20px; text-align:center; }
#login-screen h1 { font-size:32px; color:var(--accent); }
#login-screen p  { color:var(--muted); font-size:15px; line-height:1.6; }
.google-btn { background:#fff; color:#333; border:none; padding:14px 24px; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,0.3); transition:all 0.15s; }
.google-btn:active { transform:scale(0.97); }

.search-bar { padding:10px 16px; background:var(--card); border-bottom:1px solid var(--border); }
.search-bar input { width:100%; padding:10px 14px; background:var(--card2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:14px; }
.search-bar input:focus { outline:none; border-color:var(--accent); }

#leads-list { padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
.lead-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.lead-card.has-note { border-color:var(--green); }
.lead-row { padding:14px 16px; display:flex; align-items:center; gap:12px; }
.lead-info { flex:1; min-width:0; }
.lead-name  { font-size:15px; font-weight:700; }
.lead-phone { font-size:13px; color:var(--muted); margin-top:2px; direction:ltr; text-align:right; }
.lead-note-preview { font-size:12px; color:var(--green); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lead-note-box { background:rgba(39,193,122,0.08); border-top:1px solid rgba(39,193,122,0.2); padding:10px 16px; display:flex; align-items:flex-start; gap:8px; }
.note-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
.note-text  { font-size:13px; color:#7be0aa; line-height:1.5; word-break:break-word; }
.call-btn-circle { width:52px; height:52px; border-radius:50%; background:var(--green); border:none; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; flex-shrink:0; transition:all 0.15s; box-shadow:0 4px 12px rgba(39,193,122,0.3); }
.call-btn-circle:active { transform:scale(0.9); }
.call-btn-circle.done { background:var(--card2); box-shadow:none; }

#loading { display:flex; flex-direction:column; align-items:center; padding:50px 20px; gap:14px; }
.spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#note-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:300; align-items:flex-end; }
#note-modal.open { display:flex; }
.modal-sheet { background:var(--card); border-radius:24px 24px 0 0; padding:20px 18px 44px; width:100%; gap:12px; display:flex; flex-direction:column; animation:slideUp 0.22s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 8px; }
.modal-title { font-size:18px; font-weight:800; }
.modal-sub   { font-size:13px; color:var(--accent); margin-top:-6px; }

#note-input { width:100%; min-height:110px; padding:12px 14px; background:var(--card2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:15px; resize:none; direction:rtl; }
#note-input:focus { outline:none; border-color:var(--accent); }
#note-input::placeholder { color:var(--muted); }

.mic-btn { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; width:100%; }
.mic-btn.recording { background:var(--red); border-color:var(--red); color:#fff; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

.saving-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:400; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
.saving-overlay.show { display:flex; }

.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 22px; border-radius:20px; font-size:14px; z-index:500; white-space:nowrap; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

.avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; }
.avatar img { width:100%; height:100%; object-fit:cover; }
.count-badge { background:var(--card2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:12px; color:var(--muted); }

#init-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
</style>
</head>
<body>

<!-- INIT LOADING -->
<div id="init-loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px">מתחבר...</div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">
  <div style="font-size:56px">📋</div>
  <h1>לידים</h1>
  <p>התחבר עם חשבון Google<br>כדי לגשת לרשימת הלידים</p>
  <button class="google-btn" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    כניסה עם Google
  </button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="header">
    <h1>📋 לידים</h1>
    <div class="header-right">
      <span class="count-badge" id="lead-count"></span>
      <button style="background:var(--card2);border:1px solid var(--border);color:var(--accent);border-radius:20px;padding:7px 12px;font-size:13px;cursor:pointer;" onclick="loadLeads()">🔄</button>
      <div class="avatar" id="user-avatar" onclick="signOut()" title="התנתק"></div>
    </div>
  </div>
  <div class="search-bar">
    <input type="search" id="search" placeholder="🔍 חיפוש שם או טלפון..." oninput="filterLeads()" />
  </div>
  <div id="loading"><div class="spinner"></div><div style="color:var(--muted);font-size:14px">טוען לידים...</div></div>
  <div id="leads-list"></div>
</div>

<!-- NOTE MODAL -->
<div id="note-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📝 סיכום שיחה</div>
    <div class="modal-sub" id="modal-name"></div>
    <textarea id="note-input" placeholder="מה היה בשיחה?&#10;הקלד או לחץ על המיקרופון..."></textarea>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤 הכתב (מיקרופון)</button>
    <button class="btn btn-save" onclick="saveNote()">💾 שמור ב-Google Sheets</button>
    <button class="btn btn-skip" onclick="closeModal()">סגור בלי לשמור</button>
  </div>
</div>

<!-- SAVING -->
<div class="saving-overlay" id="saving-overlay">
  <div class="spinner"></div>
  <div style="color:#fff;font-size:15px">שומר בגיליון...</div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '298424991371-2ua4kvf3etp88rb1nu0o2h799ou6fdng.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyCrttdxP_Iq9A_rnf9umws6VqlbB6Q3Tdg';
const SHEET_ID  = '19v-4WBpUPjuswhQ84Y7mHULT39k2W9UJ5JqtdDpLtSM';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.profile';
const TOKEN_TTL = 45 * 60 * 1000; // 45 min

let accessToken = null;
let tokenClient = null;
let allLeads    = [];
let currentLead = null;
let recognition = null;
let isRecording = false;
let calledSet   = new Set();

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Wait for Google SDK to load
  const wait = setInterval(() => {
    if (window.google && google.accounts) {
      clearInterval(wait);
      initApp();
    }
  }, 200);
  // Timeout after 5s → show login
  setTimeout(() => {
    clearInterval(wait);
    showLogin();
  }, 5000);
});

function initApp() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    prompt: '',
    callback: handleTokenResponse
  });

  // Try auto-login with saved token
  const saved     = localStorage.getItem('leads_access_token');
  const savedTime = parseInt(localStorage.getItem('leads_token_time') || '0');
  const age       = Date.now() - savedTime;

  if (saved && age < TOKEN_TTL) {
    // Token still valid
    accessToken = saved;
    restoreUserAvatar();
    showApp();
    loadLeads();
    scheduleRefresh();
  } else {
    // Try silent refresh
    try {
      tokenClient.requestAccessToken({ prompt: '' });
    } catch(e) {
      showLogin();
    }
  }
}

function handleTokenResponse(resp) {
  if (resp.error) {
    showLogin();
    return;
  }
  accessToken = resp.access_token;
  localStorage.setItem('leads_access_token', accessToken);
  localStorage.setItem('leads_token_time', Date.now().toString());
  fetchUserInfo();
  showApp();
  loadLeads();
  scheduleRefresh();
}

function scheduleRefresh() {
  // Refresh token every 44 minutes silently
  setTimeout(() => {
    tokenClient.requestAccessToken({ prompt: '' });
    scheduleRefresh();
  }, 44 * 60 * 1000);
}

function showLogin() {
  document.getElementById('init-loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('init-loading').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function signIn() {
  if (tokenClient) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
    return;
  }
  // SDK not ready yet — wait and retry
  showToast('מתחבר...');
  const wait = setInterval(() => {
    if (window.google && google.accounts) {
      clearInterval(wait);
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        prompt: 'consent',
        callback: handleTokenResponse
      });
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }
  }, 300);
}

function signOut() {
  if (!confirm('להתנתק?')) return;
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    localStorage.removeItem('leads_access_token');
    localStorage.removeItem('leads_token_time');
    localStorage.removeItem('leads_user_pic');
    localStorage.removeItem('leads_user_name');
    showLogin();
  });
}

// ── USER INFO ─────────────────────────────────────────────────────────────────
function fetchUserInfo() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  }).then(r => r.json()).then(u => {
    localStorage.setItem('leads_user_pic',  u.picture || '');
    localStorage.setItem('leads_user_name', u.name    || '');
    setAvatar(u.picture, u.name);
  }).catch(() => {});
}

function restoreUserAvatar() {
  const pic  = localStorage.getItem('leads_user_pic');
  const name = localStorage.getItem('leads_user_name');
  setAvatar(pic, name);
}

function setAvatar(pic, name) {
  const av = document.getElementById('user-avatar');
  if (!av) return;
  if (pic) av.innerHTML = `<img src="${pic}">`;
  else av.textContent = (name || 'U')[0].toUpperCase();
}

// ── LOAD LEADS ────────────────────────────────────────────────────────────────
async function loadLeads() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('leads-list').innerHTML = '';
  try {
    const res  = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:C?key=${API_KEY}`
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    allLeads = (data.values || []).slice(1)
      .map((row, i) => ({
        index: i + 2,
        name:  (row[0] || '').trim() || '(ללא שם)',
        phone: (row[1] || '').toString().trim(),
        note:  (row[2] || '').trim()
      }))
      .filter(l => l.phone)
      .reverse(); // חדש ראשון

    document.getElementById('lead-count').textContent = allLeads.length + ' לידים';
    document.getElementById('loading').style.display = 'none';
    renderLeads(allLeads);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('leads-list').innerHTML =
      `<div style="padding:20px;color:#ff8080;font-size:14px">❌ ${e.message}</div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderLeads(leads) {
  const list = document.getElementById('leads-list');
  list.innerHTML = '';
  if (!leads.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:50px">אין לידים</div>';
    return;
  }
  leads.forEach(l => {
    const done = calledSet.has(l.index);
    const d    = document.createElement('div');
    d.className = 'lead-card' + (l.note ? ' has-note' : '');
    d.innerHTML = `<div class="lead-row">
      <div class="lead-info">
        <div class="lead-name">${esc(l.name)}</div>
        <div class="lead-phone">${esc(l.phone)}</div>
        ${l.note ? `<div class="lead-note-preview">✅ שיחה קודמת</div>` : ''}
      </div>
      <button class="call-btn-circle ${done?'done':''}"
              onclick="callLead(${l.index},'${ej(l.name)}','${ej(l.phone)}')">${done?'✓':'📞'}</button>
    </div>`;
    list.appendChild(d);
  });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ej(s)  { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterLeads() {
  const q = document.getElementById('search').value.toLowerCase();
  renderLeads(allLeads.filter(l =>
    l.name.toLowerCase().includes(q) || l.phone.includes(q)
  ));
}

// ── CALL ─────────────────────────────────────────────────────────────────────
function callLead(idx, name, phone) {
  currentLead = { index: idx, name, phone };
  calledSet.add(idx);
  window.location.href = 'tel:' + phone.replace(/[^0-9+]/g, '');
  setTimeout(() => openModal(name), 1800);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(name) {
  document.getElementById('modal-name').textContent = name;
  document.getElementById('note-input').value = '';
  document.getElementById('note-modal').classList.add('open');
  setTimeout(() => document.getElementById('note-input').focus(), 300);
}

function closeModal() {
  document.getElementById('note-modal').classList.remove('open');
  stopMic();
  filterLeads();
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveNote() {
  const note = document.getElementById('note-input').value.trim();
  closeModal();
  if (!note) return;

  const row  = currentLead.index;
  const lead = allLeads.find(l => l.index === row);
  if (lead) lead.note = note;

  document.getElementById('saving-overlay').classList.add('show');
  try {
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/C${row}?valueInputOption=RAW`,
      {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[note]] })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    showToast('✅ נשמר בגיליון!');
    filterLeads();
  } catch(e) {
    showToast('❌ ' + e.message);
  } finally {
    document.getElementById('saving-overlay').classList.remove('show');
  }
}

// ── MIC ───────────────────────────────────────────────────────────────────────
function toggleMic() {
  if (isRecording) { stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('הדפדפן לא תומך בהכתבה'); return; }
  recognition = new SR();
  recognition.lang = 'he-IL';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = e => {
    let txt = '';
    for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
    document.getElementById('note-input').value = txt;
  };
  recognition.onerror = () => stopMic();
  recognition.onend   = () => stopMic();
  recognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('mic-btn').textContent = '⏹ עצור הקלטה';
}

function stopMic() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  isRecording = false;
  const b = document.getElementById('mic-btn');
  if (b) { b.classList.remove('recording'); b.textContent = '🎤 הכתב (מיקרופון)'; }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
