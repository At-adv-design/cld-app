<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3a3a48">
<title>חדלות פירעון | אבי טל ושות׳</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --slate:#3a3a48;--slate2:#2c2c38;--red:#b01010;--red-bg:#fff2f2;--red-border:#f5c0c0;
  --orange:#c8620a;--orange-bg:#fff8f0;--orange-border:#f5d0a0;
  --green:#1a7a45;--green-bg:#f0fbf4;--green-border:#b0ddc0;
  --blue:#2060c0;--blue-bg:#f0f4ff;--blue-border:#c0d0f0;
  --bg:#f5f5f7;--white:#fff;--border:#e2e2e8;--muted:#9898a8;--text:#1a1a28;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:var(--white);height:64px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.hdr-right{display:flex;gap:8px;align-items:center;}
.hdr-count{font-size:11px;color:var(--muted);font-weight:500;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 9px;}
.hdr-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:6px 10px;font-size:13px;cursor:pointer;font-family:inherit;}
.hdr-btn:active{background:var(--border);}
.avatar{width:32px;height:32px;border-radius:4px;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}

/* TABS */
.tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--slate);border-bottom-color:var(--slate);font-weight:600;}

/* FILTERS */
.filters-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0 12px;}
.search-box:focus-within{border-color:var(--slate);}
.search-box input{flex:1;border:none;background:transparent;outline:none;padding:10px 0;font-size:14px;color:var(--text);direction:rtl;font-family:inherit;}
.search-box input::placeholder{color:var(--muted);}
.filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .12s;white-space:nowrap;}
.chip.active{background:var(--slate);color:#fff;border-color:var(--slate);}
.chip.red.active{background:var(--red);border-color:var(--red);}
.chip.orange.active{background:var(--orange);border-color:var(--orange);}

/* STATS */
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;gap:16px;font-size:11px;font-weight:500;color:var(--muted);overflow-x:auto;}
.stat{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.sdot{width:6px;height:6px;border-radius:2px;flex-shrink:0;}

/* CARDS */
#cards-list,#waiting-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}

/* SWIPE */
.swipe-wrap{position:relative;overflow:hidden;border-radius:6px;}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;padding:0 20px;font-size:13px;font-weight:600;color:#fff;pointer-events:none;}
.swipe-bg.left{background:var(--orange);justify-content:flex-end;}
.swipe-bg.right{background:var(--green);justify-content:flex-start;}
.swipe-content{position:relative;background:var(--white);}

.client-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--shadow);}
.client-card.urgent{border-right:2px solid var(--red);}
.client-card.warning{border-right:2px solid var(--orange);}

.card-header{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:15px;font-weight:600;color:var(--text);}
.client-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.status-dots{display:flex;gap:4px;flex-shrink:0;}
.sdot-lg{width:10px;height:10px;border-radius:2px;}

/* CARD BODY */
.card-body{border-top:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;}

/* REPORTS */
.reports-grid{display:flex;flex-direction:row;gap:2px;width:100%;}



.report-cell{flex:1;min-width:0;border-radius:3px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3px 1px;}
.report-cell.red{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}
.report-cell.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.report-cell.progress{background:#fff8e6;border-color:#f5dfa0;color:#9a6800;}
.report-cell.future{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);}
.report-cell.empty{background:var(--bg);color:var(--muted);}

/* STATUS ROWS */
.status-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);}
.status-row.red{background:var(--red-bg);border-color:var(--red-border);}
.status-row.orange{background:var(--orange-bg);border-color:var(--orange-border);}
.status-row.green{background:var(--green-bg);border-color:var(--green-border);}
.status-label{font-size:12px;font-weight:500;}
.status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.badge-red{background:var(--red);color:#fff;}
.badge-orange{background:var(--orange);color:#fff;}
.badge-green{background:var(--green);color:#fff;}
.badge-gray{background:var(--muted);color:#fff;}
.reminder-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;border:1px solid #f5dfa0;background:#fff8e6;}
.reminder-text{font-size:12px;font-weight:500;color:#9a6800;flex:1;}

/* WAITING */
.waiting-badge{font-size:10px;font-weight:700;color:var(--orange);background:rgba(200,98,10,0.1);border:1px solid rgba(200,98,10,0.25);border-radius:3px;padding:2px 6px;margin-top:4px;display:inline-block;}
.restore-btn{width:40px;height:40px;border-radius:4px;background:var(--white);border:1px solid var(--green);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--green);}
.restore-btn:active{transform:scale(.92);}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--slate);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;gap:24px;text-align:center;background:var(--white);}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:320px;}
.google-btn{background:var(--white);color:var(--text);border:1px solid var(--border);padding:13px 20px;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);width:100%;justify-content:center;font-family:inherit;}
.google-btn:active{transform:scale(.98);}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--slate);color:#fff;padding:10px 20px;border-radius:4px;font-size:13px;font-weight:500;z-index:500;white-space:nowrap;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img src="logo.png" alt="אבי טל ושות׳" style="width:180px;object-fit:contain;" onerror="this.style.display='none'">
    <div style="font-size:15px;font-weight:600;color:var(--text)">חדלות פירעון</div>
    <div style="font-size:13px;color:var(--muted)">ניהול תיקים | כניסה עם Google</div>
    <button class="google-btn" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      כניסה עם Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <img src="logo.png" alt="אבי טל ושות׳" style="height:80px;object-fit:contain;margin-left:auto;" onerror="this.style.display='none'">
    <div class="hdr-right">
      <span class="hdr-count" id="total-count">טוען...</span>
      <button class="hdr-btn" onclick="loadData()">↺</button>
      <div class="avatar" id="user-avatar" onclick="signOut()"></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-main" onclick="switchTab('main')">תיקים פעילים</div>
    <div class="tab" id="tab-waiting" onclick="switchTab('waiting')">⏸ ממתינים</div>
  </div>

  <div id="main-section">
    <div class="filters-wrap">
      <div class="search-box">
        <span style="color:var(--muted);font-size:13px">⌕</span>
        <input type="search" id="search" placeholder="חיפוש שם לקוח או מספר תיק..." oninput="applyFilters()"/>
      </div>
      <div class="filter-row">
        <span class="filter-label">דוחות פתוחים:</span>
        <div class="filter-chips" id="report-chips" style="display:flex;gap:4px;flex-wrap:wrap;">
          <div class="chip active" onclick="setReportFilter('all',this)">הכל</div>
          <div class="chip red" onclick="setReportFilter(1,this)">1</div>
          <div class="chip red" onclick="setReportFilter(2,this)">2</div>
          <div class="chip red" onclick="setReportFilter(3,this)">3</div>
          <div class="chip red" onclick="setReportFilter(4,this)">4</div>
          <div class="chip red" onclick="setReportFilter(5,this)">5</div>
          <div class="chip red" onclick="setReportFilter(6,this)">6</div>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">מסמכים:</span>
        <div class="chip active" id="fd-all" onclick="setF('docs','all')">הכל</div>
        <div class="chip red" id="fd-urgent" onclick="setF('docs','urgent')">דחוף</div>
        <div class="chip orange" id="fd-warning" onclick="setF('docs','warning')">בטיפול</div>
      </div>
      <div class="filter-row">
        <span class="filter-label">עיכוב הליכים:</span>
        <div class="chip active" id="fi-all" onclick="setF('inj','all')">הכל</div>
        <div class="chip red" id="fi-urgent" onclick="setF('inj','urgent')">דחוף</div>
      </div>
      <div class="filter-row">
        <span class="filter-label">אישורי מסירה:</span>
        <div class="chip active" id="fs-all" onclick="setF('srv','all')">הכל</div>
        <div class="chip red" id="fs-urgent" onclick="setF('srv','urgent')">דחוף</div>
        <div class="chip orange" id="fs-warning" onclick="setF('srv','warning')">בטיפול</div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="sdot" style="background:var(--red)"></div><span id="s-urgent">0 דחוף</span></div>
      <div class="stat"><div class="sdot" style="background:var(--orange)"></div><span id="s-warning">0 אזהרה</span></div>
      <div class="stat"><div class="sdot" style="background:var(--green)"></div><span id="s-ok">0 תקין</span></div>
      <div class="stat"><div class="sdot" style="background:#9a6800"></div><span id="s-reminder">0 תזכורת</span></div>
    </div>
    <div id="loading"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">טוען תיקים...</div></div>
    <div id="cards-list"></div>
  </div>

  <div id="waiting-section" style="display:none">
    <div style="padding:12px 16px;font-size:12px;color:var(--muted);font-weight:500">גרור ימינה להחזרה לתיקים פעילים</div>
    <div id="waiting-list"></div>
  </div>
</div>

<script>
const CLIENT_ID='298424991371-2ua4kvf3etp88rb1nu0o2h799ou6fdng.apps.googleusercontent.com';
const API_KEY='AIzaSyCrttdxP_Iq9A_rnf9umws6VqlbB6Q3Tdg';
const SHEET_ID='1ixQ0iImkxI1YiTrX_dFsSxVTISUyfCEYpKt1C2EWtLE';
const SCOPES='https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';
const REDIRECT=location.origin+location.pathname;
const ALLOWED=['avi@t-adv.co.il','office@t-adv.co.il','tal.adv.offc2@gmail.com','avi.t.razr@gmail.com'];

// Columns (0-based)
const C_NAME=22,C_CASE=66;
const C_DOCS_LIST=28,C_DOCS_AE=30,C_DOCS_AG=32,C_DOCS_AH=33,C_DOCS_AI=34;
const C_AL=37,C_AZ=51;
const C_BG=58,C_BH=59,C_BI=60;
const C_CE=82;
const C_REP_DATES=[39,41,43,45,47,49]; // AN AP AR AT AV AX
const C_REP_STATUS=[40,42,44,46,48,50]; // AO AQ AS AU AW AY

let accessToken=null,allClients=[],expandedSet=new Set();
let waitingSet=new Set(JSON.parse(localStorage.getItem('ins_waiting')||'[]'));
let curTab='main';
let fReport='all',fDocs='all',fInj='all',fSrv='all';

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin(){
  location.href='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:CLIENT_ID,redirect_uri:REDIRECT,response_type:'token',
    scope:SCOPES,prompt:'select_account'
  });
}
function signOut(){
  if(!confirm('להתנתק?'))return;
  ['it','ite','ip','in'].forEach(k=>localStorage.removeItem(k));
  accessToken=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

window.addEventListener('load',()=>{
  if(location.hash&&location.hash.includes('access_token')){
    const p=new URLSearchParams(location.hash.substring(1));
    const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||'3600');
    if(tok){
      accessToken=tok;
      localStorage.setItem('it',tok);
      localStorage.setItem('ite',(Date.now()+(exp-120)*1000).toString());
      history.replaceState(null,'',location.pathname);
      fetchUserInfo();showApp();loadData();return;
    }
  }
  const tok=localStorage.getItem('it'),exp=parseInt(localStorage.getItem('ite')||'0');
  if(tok&&Date.now()<exp){accessToken=tok;restoreAvatar();showApp();loadData();}
  // else login screen already visible
});

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}
function fetchUserInfo(){
  fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}})
    .then(r=>r.json()).then(u=>{
      if(!ALLOWED.includes((u.email||'').toLowerCase())){
        ['it','ite','ip','in'].forEach(k=>localStorage.removeItem(k));
        accessToken=null;
        document.getElementById('app').style.display='none';
        document.getElementById('login-screen').style.display='flex';
        alert('אין הרשאה: '+u.email);return;
      }
      localStorage.setItem('ip',u.picture||'');localStorage.setItem('in',u.name||'');
      setAvatar(u.picture,u.name);
    }).catch(()=>{});
}
function restoreAvatar(){setAvatar(localStorage.getItem('ip'),localStorage.getItem('in'));}
function setAvatar(pic,name){
  const av=document.getElementById('user-avatar');if(!av)return;
  av.innerHTML=pic?`<img src="${pic}">`:(name||'U')[0].toUpperCase();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  document.getElementById('tab-main').className='tab'+(tab==='main'?' active':'');
  document.getElementById('tab-waiting').className='tab'+(tab==='waiting'?' active':'');
  document.getElementById('main-section').style.display=tab==='main'?'block':'none';
  document.getElementById('waiting-section').style.display=tab==='waiting'?'block':'none';
  if(tab==='waiting')renderWaiting();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('cards-list').innerHTML='';
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:CE?key=${API_KEY}`);
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const rows=(data.values||[]).slice(2);
    allClients=rows.map((row,i)=>parseClient(row,i+3)).filter(c=>c&&c.name&&c.name.trim());
    const active=allClients.filter(c=>!waitingSet.has(c.rowNum));
    document.getElementById('total-count').textContent=active.length+' תיקים';
    updateWaitingTab();
    updateStats(active);
    document.getElementById('loading').style.display='none';
    renderCards(active);
    setTimeout(loadData,3*60*1000);
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('cards-list').innerHTML=`<div style="padding:20px;color:var(--red)">❌ ${e.message}</div>`;
  }
}

// ── PARSE ─────────────────────────────────────────────────────────────────────
function parseClient(row,rowNum){
  const g=i=>(row[i]||'').toString().trim();
  const name=g(C_NAME);if(!name)return null;

  const today=new Date();today.setHours(0,0,0,0);
  const in7=new Date(today);in7.setDate(today.getDate()+7);

  // REPORTS
  const reports=[],reportStatus=[];
  for(let i=0;i<6;i++){
    const dv=g(C_REP_DATES[i]),sv=g(C_REP_STATUS[i]).toLowerCase();
    reports.push(dv); // always store date from date column
    if(sv==='הוגש') reportStatus.push('done');
    else if(sv.includes('בתהליך')||sv.includes('בתהל')) reportStatus.push('progress');
    else if(!dv) reportStatus.push('empty');
    else{
      const d=parseDate(dv);
      if(!d) reportStatus.push('empty');
      else if(d<today){
        // לפני 2025 = לא נספר כפיגור בפילטר, אבל מוצג
        if(d.getFullYear()<2025) reportStatus.push('old');
        else reportStatus.push('overdue');
      }
      else reportStatus.push('future');
    }
  }
  // CE מעמודה (מחושב ע"י סקריפט) — אם 0 השתמש בחישוב מקומי
  const ceVal=parseInt(g(C_CE))||0;
  const calcCount=reportStatus.filter(s=>s==='overdue').length;
  const overdueCount=ceVal>0?ceVal:calcCount;

  // DOCS
  const docsList=g(C_DOCS_LIST);
  const agDate=parseDate(g(C_DOCS_AG)),aeDate=parseDate(g(C_DOCS_AE));
  const docsDone=g(C_DOCS_AH).includes('בוצע');
  const docsReminder=g(C_DOCS_AI)==='TRUE';
  const docsHighUrgent=!docsDone&&agDate&&agDate<=in7;
  const docsLowUrgent=!docsDone&&!docsHighUrgent&&aeDate&&aeDate<today;

  // INJUNCTION
  const alDate=parseDate(g(C_AL));
  const injUrgent=alDate&&alDate<=in7;

  // SERVICE
  const bgDate=parseDate(g(C_BG));
  const serviceDone=g(C_BI).includes('בוצע');
  let bg45=null;if(bgDate){bg45=new Date(bgDate);bg45.setDate(bgDate.getDate()+45);}
  const srvWarning=!serviceDone&&bgDate&&bgDate<today&&!(bg45&&bg45<today);
  const srvUrgent=!serviceDone&&bg45&&bg45<today;

  // REMINDER
  const reminder=g(C_AZ)==='TRUE';

  const isUrgent=overdueCount>0||docsHighUrgent||injUrgent||srvUrgent;
  const isWarning=!isUrgent&&(docsLowUrgent||srvWarning||docsReminder||reminder);

  return{rowNum,name,caseNum:g(C_CASE),reports,reportStatus,overdueCount,
    docsList,docsDone,docsHighUrgent,docsLowUrgent,docsReminder,
    injUrgent,serviceDone,srvWarning,srvUrgent,reminder,isUrgent,isWarning};
}

function parseDate(s){
  if(!s)return null;
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){
    const y=m[3].length===2?2000+parseInt(m[3]):parseInt(m[3]);
    return new Date(y,parseInt(m[2])-1,parseInt(m[1]));
  }
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}

function fmtDate(s){
  if(!s||s==='')return'—';
  let m;
  // dd/mm/yy or dd/mm/yyyy — return mm/yy
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){
    const mm=m[2].padStart(2,'0');
    const yy=m[3].length===4?m[3].slice(2):m[3];
    return mm+'/'+yy;
  }
  // yyyy-mm-dd
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return m[2]+'/'+m[1].slice(2);
  if(s.length<=5) return s;
  return s.substring(0,5);
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function setReportFilter(val,el){
  fReport=val;
  document.querySelectorAll('#report-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setF(type,val){
  if(type==='docs')fDocs=val;
  else if(type==='inj')fInj=val;
  else if(type==='srv')fSrv=val;
  ['all','urgent','warning'].forEach(v=>{
    const el=document.getElementById('f'+type[0]+'-'+v);
    if(el)el.classList.toggle('active',v===val);
  });
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const active=allClients.filter(c=>!waitingSet.has(c.rowNum));
  const filtered=active.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)&&!c.caseNum.toLowerCase().includes(q))return false;
    if(fReport!=='all'&&c.overdueCount!==fReport)return false;
    if(fDocs==='urgent'&&!c.docsHighUrgent)return false;
    if(fDocs==='warning'&&!c.docsLowUrgent)return false;
    if(fInj==='urgent'&&!c.injUrgent)return false;
    if(fSrv==='urgent'&&!c.srvUrgent)return false;
    if(fSrv==='warning'&&!c.srvWarning)return false;
    return true;
  });
  renderCards(filtered);
}

function updateStats(active){
  const urgent=active.filter(c=>c.isUrgent).length;
  const warning=active.filter(c=>c.isWarning).length;
  const ok=active.filter(c=>!c.isUrgent&&!c.isWarning).length;
  const rem=active.filter(c=>c.reminder).length;
  document.getElementById('s-urgent').textContent=urgent+' דחוף';
  document.getElementById('s-warning').textContent=warning+' אזהרה';
  document.getElementById('s-ok').textContent=ok+' תקין';
  document.getElementById('s-reminder').textContent=rem+' תזכורת';
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────────
function renderCards(clients){
  const list=document.getElementById('cards-list');
  list.innerHTML='';
  if(!clients.length){list.innerHTML='<div class="empty">אין תיקים</div>';return;}
  clients.forEach(c=>{
    const exp=expandedSet.has(c.rowNum);

    // Report cells - show date for ALL
    const reportCells=c.reportStatus.map((s,i)=>{
      const cls=s==='overdue'?'red':s==='done'?'green':s==='progress'?'progress':s==='future'?'future':'empty';
      const lbl=['ד1','ד2','ד3','ד4','ד5','ד6'][i];
      const dateStr=fmtDate(c.reports[i]);
      let topLine,botLine;
      if(s==='done'){topLine=lbl+' ✓';botLine=dateStr;}
      else if(s==='progress'){topLine=lbl;botLine=dateStr!=='—'?dateStr:'⋯';}
      else{topLine=lbl;botLine=dateStr;}
      return`<div class="report-cell ${cls}" title="${c.reports[i]||''}">
        <span style="font-size:6px;font-weight:700;line-height:1">${topLine}</span>
        <span style="font-size:6px;font-weight:400;line-height:1">${botLine||'&nbsp;'}</span>
      </div>`;
    }).join('');

    // Docs
    const docsCls=c.docsDone?'green':c.docsHighUrgent?'red':c.docsLowUrgent?'orange':'';
    const docsBadge=c.docsDone?'badge-green':c.docsHighUrgent?'badge-red':c.docsLowUrgent?'badge-orange':'badge-gray';
    const docsText=c.docsDone?'הסתיים ✓':c.docsHighUrgent?'דחוף':c.docsLowUrgent?'בטיפול':'תקין';

    // Injunction
    const injCls=c.injUrgent?'red':'';
    const injText=c.injUrgent?'דחוף':'תקין';

    // Service
    const srvCls=c.serviceDone?'green':c.srvUrgent?'red':c.srvWarning?'orange':'';
    const srvBadge=c.serviceDone?'badge-green':c.srvUrgent?'badge-red':c.srvWarning?'badge-orange':'badge-gray';
    const srvText=c.serviceDone?'הסתיים ✓':c.srvUrgent?'דחוף — 45+ יום':c.srvWarning?'בטיפול':'תקין';

    // Dots
    const d1=c.isUrgent?'var(--red)':c.isWarning?'var(--orange)':'var(--green)';
    const d2=c.overdueCount>0?'var(--red)':'var(--muted)';
    const d3=c.docsHighUrgent?'var(--red)':c.docsLowUrgent?'var(--orange)':'var(--muted)';
    const d4=c.srvUrgent?'var(--red)':c.srvWarning?'var(--orange)':'var(--muted)';
    const d5=c.injUrgent?'var(--red)':'var(--muted)';

    let bodyHtml='';
    if(exp){
      bodyHtml=`<div class="card-body">
        <div>
          <div class="status-row ${c.overdueCount>0?'red':''}">
            <span class="status-label">דוחות</span>
            <span class="status-badge ${c.overdueCount>0?'badge-red':'badge-gray'}">${c.overdueCount>0?c.overdueCount+' לא הוגשו':'הכל הוגש ✓'}</span>
          </div>
          ${c.reminder?'<div class="reminder-row"><span>🔔</span><span class="reminder-text">תזכורת דוחות — ב-10 וב-20 לחודש</span></div>':''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div class="section-title" style="color:var(--slate)">השלמת מסמכים</div>
          ${c.docsList?`<div style="font-size:12px;color:var(--muted);padding:5px 8px;background:var(--bg);border-radius:4px;border:1px solid var(--border);margin-bottom:4px">${esc(c.docsList)}</div>`:''}
          <div class="status-row ${docsCls}"><span class="status-label">מסמכים</span><span class="status-badge ${docsBadge}">${docsText}</span></div>
          ${c.docsReminder?'<div class="reminder-row"><span>🔔</span><span class="reminder-text">תזכורת — ב-5, 15 ו-25 לחודש</span></div>':''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div class="section-title" style="color:var(--slate)">עיכוב הליכים ואישורי מסירה</div>
          <div class="status-row ${injCls}"><span class="status-label">עיכוב הליכים (AL)</span><span class="status-badge ${c.injUrgent?'badge-red':'badge-gray'}">${injText}</span></div>
          <div class="status-row ${srvCls}"><span class="status-label">אישורי מסירה</span><span class="status-badge ${srvBadge}">${srvText}</span></div>
        </div>
      </div>`;
    }

    const card=document.createElement('div');
    card.innerHTML=`
      <div class="client-card${c.isUrgent?' urgent':c.isWarning?' warning':''}" data-row="${c.rowNum}">
        <div class="card-header" onclick="toggleExpand(${c.rowNum})">
          <div class="client-info">
            <div class="client-name">${esc(c.name)}</div>
            <div class="client-meta">${c.caseNum?'תיק: '+esc(c.caseNum):''}${c.overdueCount>0?' • '+c.overdueCount+' דוחות פתוחים':''}</div>
          </div>
          <div class="status-dots">
            <div class="sdot-lg" style="background:${d1}" title="כללי"></div>
            <div class="sdot-lg" style="background:${d2}" title="דוחות"></div>
            <div class="sdot-lg" style="background:${d3}" title="מסמכים"></div>
            <div class="sdot-lg" style="background:${d4}" title="מסירה"></div>
            <div class="sdot-lg" style="background:${d5}" title="עיכוב הליכים"></div>
          </div>
        </div>
        ${bodyHtml}
      </div>`;

    const wrap=document.createElement('div');
    wrap.className='swipe-wrap';
    wrap.innerHTML='<div class="swipe-bg left">⏸ להמתנה</div><div class="swipe-bg right"></div>';
    const content=document.createElement('div');
    content.className='swipe-content';
    content.appendChild(card);
    wrap.appendChild(content);
    list.appendChild(wrap);
    initSwipe(wrap,c.rowNum,'waiting');
  });
}

// ── RENDER WAITING ────────────────────────────────────────────────────────────
function renderWaiting(){
  const list=document.getElementById('waiting-list');
  const waiting=allClients.filter(c=>waitingSet.has(c.rowNum));
  if(!waiting.length){list.innerHTML='<div class="empty">אין תיקים בהמתנה</div>';return;}
  list.innerHTML='';
  waiting.forEach(c=>{
    const wrap=document.createElement('div');
    wrap.className='swipe-wrap';
    wrap.innerHTML='<div class="swipe-bg left"></div><div class="swipe-bg right">↩ החזר</div>';
    const content=document.createElement('div');
    content.className='swipe-content';
    content.innerHTML=`<div class="client-card" style="opacity:.75" data-row="${c.rowNum}">
      <div class="card-header" style="cursor:default">
        <div class="client-info">
          <div class="client-name">${esc(c.name)}</div>
          <div class="client-meta">${c.caseNum?'תיק: '+esc(c.caseNum):''}</div>
          <div class="waiting-badge">⏸ בהמתנה</div>
        </div>
        <button class="restore-btn" onclick="restoreClient(${c.rowNum})">↩</button>
      </div>
    </div>`;
    wrap.appendChild(content);
    list.appendChild(wrap);
    initSwipe(wrap,c.rowNum,'restore');
  });
}

// ── SWIPE ─────────────────────────────────────────────────────────────────────
function initSwipe(wrap,rowNum,action){
  const content=wrap.querySelector('.swipe-content');
  const bgL=wrap.querySelector('.swipe-bg.left');
  const bgR=wrap.querySelector('.swipe-bg.right');
  let sx=0,sy=0,dx=0,going=false,axis=null;
  const THRESH=80;

  wrap.addEventListener('touchstart',e=>{
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;going=true;axis=null;dx=0;
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    if(!going)return;
    const t=e.touches[0];
    const mx=t.clientX-sx,my=t.clientY-sy;
    if(!axis)axis=Math.abs(mx)>8||Math.abs(my)>8?(Math.abs(mx)>Math.abs(my)?'x':'y'):null;
    if(axis!=='x')return;
    e.preventDefault();
    dx=mx;
    content.style.transition='none';
    content.style.transform=`translateX(${dx}px)`;
    const pct=Math.min(Math.abs(dx)/THRESH,1);
    // For 'waiting': swipe left only
    // For 'restore': swipe right only
    if(action==='waiting'&&dx<0){bgL.style.opacity=pct;bgR.style.opacity=0;}
    else if(action==='restore'&&dx>0){bgR.style.opacity=pct;bgL.style.opacity=0;}
    else{bgL.style.opacity=0;bgR.style.opacity=0;}
  },{passive:false});

  wrap.addEventListener('touchend',()=>{
    if(!going||axis!=='x'){going=false;return;}
    going=false;
    content.style.transition='transform .2s';
    const triggered=(action==='waiting'&&dx<=-THRESH)||(action==='restore'&&dx>=THRESH);
    if(triggered){
      content.style.transform=`translateX(${dx<0?'-110%':'110%'})`;
      setTimeout(()=>{
        if(action==='waiting') moveToWaiting(rowNum);
        else restoreClient(rowNum);
      },200);
    }else{
      content.style.transform='';
      bgL.style.opacity=0;bgR.style.opacity=0;
    }
  });
}

function moveToWaiting(rowNum){
  waitingSet.add(rowNum);
  localStorage.setItem('ins_waiting',JSON.stringify([...waitingSet]));
  // Remove from DOM immediately
  const el=document.querySelector(`[data-row="${rowNum}"]`);
  if(el)el.closest('.swipe-wrap').remove();
  const active=allClients.filter(c=>!waitingSet.has(c.rowNum));
  document.getElementById('total-count').textContent=active.length+' תיקים';
  updateWaitingTab();
  showToast('תיק הועבר להמתנה');
}

function restoreClient(rowNum){
  waitingSet.delete(rowNum);
  localStorage.setItem('ins_waiting',JSON.stringify([...waitingSet]));
  const el=document.querySelector(`[data-row="${rowNum}"]`);
  if(el)el.closest('.swipe-wrap').remove();
  updateWaitingTab();
  showToast('תיק שוחזר');
}

function updateWaitingTab(){
  const n=waitingSet.size;
  document.getElementById('tab-waiting').textContent='⏸ ממתינים'+(n>0?' ('+n+')':'');
}

function toggleExpand(rowNum){
  if(expandedSet.has(rowNum))expandedSet.delete(rowNum);else expandedSet.add(rowNum);
  applyFilters();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
</script>
