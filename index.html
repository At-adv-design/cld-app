<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3a3a48">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>אבי טל ושות׳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --slate:#3a3a48;--slate2:#2c2c38;--red:#b01010;
  --bg:#f5f5f7;--white:#fff;--border:#e2e2e8;
  --muted:#9898a8;--text:#1a1a28;--blue:#1a5f9e;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:36px;}
.brand{display:flex;flex-direction:column;align-items:center;gap:14px;}
.brand img{width:200px;object-fit:contain;}
.brand-tagline{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:.5px;}
.choose-title{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:-8px;letter-spacing:.4px;}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--text);box-shadow:var(--shadow);transition:all .15s;cursor:pointer;}
.card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.card-icon{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;color:#fff;}
.card-leads .card-icon{background:var(--slate);}
.card-insolv .card-icon{background:var(--red);}
.card-info{flex:1;min-width:0;}
.card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;}
.card-sub{font-size:12px;color:var(--muted);font-weight:500;}
.card-arrow{color:var(--muted);font-size:20px;flex-shrink:0;}
.footer{margin-top:auto;padding-top:24px;font-size:11px;color:var(--muted);font-weight:500;}
</style>
</head>
<body>
  <div class="brand">
    <img src="logo.png" alt="אבי טל ושות׳">
    <div class="brand-tagline">משרד עורכי דין</div>
  </div>

  <div class="choose-title">בחר מערכת</div>

  <div class="cards">
    <a class="card card-leads" href="leads/">
      <div class="card-icon">📋</div>
      <div class="card-info">
        <div class="card-title">ניהול לידים</div>
        <div class="card-sub">פניות חדשות, סיכומי שיחה והעברות</div>
      </div>
      <div class="card-arrow">‹</div>
    </a>

    <a class="card card-insolv" href="insolvency/">
      <div class="card-icon">⚖️</div>
      <div class="card-info">
        <div class="card-title">חדלות פירעון</div>
        <div class="card-sub">תיקים פעילים, דוחות ומסמכים</div>
      </div>
      <div class="card-arrow">‹</div>
    </a>
  </div>

  <div class="footer">© אבי טל ושות׳</div>
</body>
</html>
