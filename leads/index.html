/* =========================
   SWIPE
   - Active tab: left -> removed, right -> continue
   - Continue tab: left -> removed, right -> active
   ========================= */
function initSwipe(wrap,idx,kind){
  const content=wrap.querySelector('.swipe-content');
  const bgL=wrap.querySelector('.swipe-bg.left');
  const bgR=wrap.querySelector('.swipe-bg.right');
  let startX=0,startY=0,currentX=0,swiping=false,axis=null;
  const threshold=80;

  function onStart(e){
    const t=e.touches?e.touches[0]:e;
    startX=t.clientX;startY=t.clientY;swiping=true;axis=null;currentX=0;
  }
  function onMove(e){
    if(!swiping)return;
    const t=e.touches?e.touches[0]:e;
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(!axis){if(Math.abs(dx)>8||Math.abs(dy)>8)axis=Math.abs(dx)>Math.abs(dy)?'x':'y';}
    if(axis!=='x')return;
    e.preventDefault();
    currentX=dx;
    content.style.transform=`translateX(${dx}px)`;
    content.style.transition='none';
    const pct=Math.min(Math.abs(dx)/threshold,1);
    if(dx<0){bgL.style.opacity=pct;bgR.style.opacity=0;}
    else{bgR.style.opacity=pct;bgL.style.opacity=0;}
  }
  function onEnd(){
    if(!swiping||axis!=='x'){swiping=false;return;}
    swiping=false;
    content.style.transition='';
    if(Math.abs(currentX)>=threshold){
      const goingLeft=currentX<0;
      content.style.transform=`translateX(${goingLeft?'-120%':'120%'})`;
      setTimeout(()=>{
        if(kind==='active'){
          if(goingLeft) setLeadStatus(idx,STATUS_REMOVED,'ליד הוסר');
          else          setLeadStatus(idx,STATUS_CONTINUE,'ליד הועבר ל"המשך"');
        } else if(kind==='continue'){
          if(goingLeft) setLeadStatus(idx,STATUS_REMOVED,'ליד הוסר');
          else          setLeadStatus(idx,STATUS_ACTIVE,'ליד הוחזר ללידים');
        } else if(kind==='removed'){
          // From "removed": only swipe-right is a meaningful action (restore).
          // Swipe-left does nothing — snap back instead.
          if(!goingLeft) setLeadStatus(idx,STATUS_ACTIVE,'ליד הוחזר ללידים');
          else { content.style.transform=''; bgL.style.opacity=0; bgR.style.opacity=0; }
        } else if(kind==='noanswer'){
          // From the "לא נענו" sub-tab:
          //   Swipe-right → clear AE + move to continue
          //   Swipe-left  → clear AE + move to removed
          // Single combined undo: capture state of BOTH AE/AF and V before
          // changing anything, restore everything in one go on undo.
          _swipeNoAnswerAway(idx, goingLeft);
        } else if(kind==='meeting' || kind==='reminder'){
          // From the "פגישה" / "תזכורת" sub-tabs:
          //   Swipe-right → return the lead to the plain "המשך" sub-tab
          //                 (we clear the relevant date so it stops showing
          //                 up in the meeting/reminder sub-tab).
          //   Swipe-left  → move to "הוסרו".
          if(goingLeft){
            setLeadStatus(idx,STATUS_REMOVED,'ליד הוסר');
          } else {
            _swipeClearMeetingReminder(idx, kind);
          }
        }
      },220);
    } else {
      content.style.transform='';
      bgL.style.opacity=0;bgR.style.opacity=0;
    }
  }
  wrap.addEventListener('touchstart',onStart,{passive:true});
  wrap.addEventListener('touchmove',onMove,{passive:false});
  wrap.addEventListener('touchend',onEnd);
  // Blur the search input when a swipe starts — otherwise the keyboard stays
  // up and intercepts touch events, breaking swipe on search results.
  wrap.addEventListener('touchstart', ()=>{
    const s = document.getElementById('search');
    if(s && document.activeElement === s) s.blur();
  }, {passive:true});
}

/* Write TRUE/FALSE to column AE for a lead. When TRUE, the lead is
   marked as "לא נענו" and only appears in the no-answer sub-tab. */
async function setNoAnswer(idx, value){
  const lead = allLeads.find(l => l.index === idx);
  // Capture previous state for undo
  const prevValue = lead ? !!lead.noAnswer : false;
  const prevTs    = lead ? (lead.noAnswerTs || 0) : 0;
  const prevMovedAt = lead ? (lead.movedAt || 0) : 0;

  const ts = value ? Date.now() : 0;
  if(lead){
    lead.noAnswer = !!value;
    lead.noAnswerTs = ts;
    if(value){
      const moves = loadMovesMap();
      moves[idx] = ts;
      saveMovesMap(moves);
      lead.movedAt = ts;
    }
    const i = allLeads.indexOf(lead);
    if(i > 0){ allLeads.splice(i, 1); allLeads.unshift(lead); }
  }
  filterLeads();
  // Two parallel writes: AE (flag) and AF (timestamp). Fire-and-forget
  // for instant UI — on failure the writes go to the offline queue which
  // flushQueue() retries automatically.
  const urlAE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AE${idx}?valueInputOption=USER_ENTERED`;
  const optsAE = {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({values:[[ value ? 'TRUE' : 'FALSE' ]]})};
  const urlAF = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AF${idx}?valueInputOption=RAW`;
  const optsAF = {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({values:[[ value ? String(ts) : '' ]]})};
  apiFetch(urlAE, optsAE).catch(()=>enqueueWrite(urlAE, optsAE, 'לא נענו'));
  apiFetch(urlAF, optsAF).catch(()=>enqueueWrite(urlAF, optsAF, 'תאריך לא נענו'));
  appendMetaLog(idx, value ? 'סומן כלא נענו' : 'הוסרה הסימון לא נענו');

  // Show undo toast — gives the user 3 seconds to revert this move
  const msg = value ? 'הליד סומן כלא נענו' : 'הוסרה הסימון לא נענו';
  showUndoToast(msg, () => {
    _undoSetNoAnswer(idx, prevValue, prevTs, prevMovedAt);
  });
}

/* Undo helper for setNoAnswer */
function _undoSetNoAnswer(idx, prevValue, prevTs, prevMovedAt){
  const lead = allLeads.find(l => l.index === idx);
  if(lead){
    lead.noAnswer = !!prevValue;
    lead.noAnswerTs = prevTs;
    lead.movedAt = prevMovedAt;
    const moves = loadMovesMap();
    if(prevMovedAt) moves[idx] = prevMovedAt; else delete moves[idx];
    saveMovesMap(moves);
  }
  filterLeads();
  const urlAE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AE${idx}?valueInputOption=USER_ENTERED`;
  const optsAE = {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({values:[[ prevValue ? 'TRUE' : 'FALSE' ]]})};
  const urlAF = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AF${idx}?valueInputOption=RAW`;
  const optsAF = {method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({values:[[ prevTs ? String(prevTs) : '' ]]})};
  apiFetch(urlAE, optsAE).catch(()=>enqueueWrite(urlAE, optsAE, 'ביטול לא נענו'));
  apiFetch(urlAF, optsAF).catch(()=>enqueueWrite(urlAF, optsAF, 'ביטול תאריך לא נענו'));
  appendMetaLog(idx, 'בוטל המעבר');
  showToast('המעבר בוטל', 'ok');
}

/* =========================
   STATUS UPDATE — writes to column V
   ========================= */
async function setLeadStatus(idx,status,toastMsg){
  // optimistic UI
  const lead=allLeads.find(l=>l.index===idx);
  // Capture the previous state BEFORE we change anything, so an undo
  // can put it back exactly as it was.
  const prevStatus = lead ? (lead.status || '') : '';
  const prevMovedAt = lead ? (lead.movedAt || 0) : 0;

  if(lead){
    lead.status=status;
    // Persist a "moved at" timestamp per row so the order survives reloads.
    // loadLeads() reads this map and sorts each tab so most recently moved
    // leads appear first.
    const moves=loadMovesMap();
    moves[idx]=Date.now();
    saveMovesMap(moves);
    lead.movedAt=moves[idx];
    // Bump in-memory immediately so the change is visible without a reload.
    const i=allLeads.indexOf(lead);
    if(i>0){ allLeads.splice(i,1); allLeads.unshift(lead); }
  }
  filterLeads();

  // Show an undo toast instead of a plain message — gives the user 3 seconds
  // to cancel the move. If they tap "ביטול", we restore the old status and
  // also write that back to the sheet.
  if(toastMsg){
    showUndoToast(toastMsg, () => {
      _undoSetLeadStatus(idx, prevStatus, prevMovedAt);
    });
  }

  // Fire-and-forget write — UI is already updated. On failure the write
  // goes to the offline queue which retries automatically.
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/V${idx}?valueInputOption=RAW`;
  const opts={method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[[status]]})};
  apiFetch(url,opts).catch(()=>{
    enqueueWrite(url,opts,'סטטוס ליד');
  });
  // Also append a metadata log entry to column AB so we have full audit trail
  const label = status===STATUS_CONTINUE ? 'הועבר להמשך'
              : status===STATUS_REMOVED ? 'הוסר'
              : 'הוחזר ללידים';
  appendMetaLog(idx, label);
}

/* Undo helper — restore a lead's previous status (called from undo toast). */
function _undoSetLeadStatus(idx, prevStatus, prevMovedAt){
  const lead = allLeads.find(l => l.index === idx);
  if(lead){
    lead.status = prevStatus;
    lead.movedAt = prevMovedAt;
    const moves = loadMovesMap();
    if(prevMovedAt) moves[idx] = prevMovedAt;
    else delete moves[idx];
    saveMovesMap(moves);
  }
  filterLeads();
  // Persist the restored status to the sheet
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/V${idx}?valueInputOption=RAW`;
  const opts = {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[[prevStatus]]})};
  apiFetch(url, opts).catch(() => enqueueWrite(url, opts, 'ביטול'));
  appendMetaLog(idx, 'בוטל המעבר');
  showToast('המעבר בוטל', 'ok');
}

/* Combined swipe action for the "לא נענו" sub-tab.
   Captures BOTH the AE/AF state (no-answer flag + timestamp) AND the
   V (status) value, performs the new write, and offers a single undo
   that restores everything atomically. */
function _swipeNoAnswerAway(idx, goingLeft){
  const lead = allLeads.find(l => l.index === idx);
  if(!lead) return;
  // Snapshot
  const prev = {
    noAnswer: !!lead.noAnswer,
    noAnswerTs: lead.noAnswerTs || 0,
    status: lead.status || '',
    movedAt: lead.movedAt || 0,
  };
  // Apply locally
  lead.noAnswer = false;
  lead.noAnswerTs = 0;
  lead.status = goingLeft ? STATUS_REMOVED : STATUS_CONTINUE;
  const moves = loadMovesMap();
  moves[idx] = Date.now();
  saveMovesMap(moves);
  lead.movedAt = moves[idx];
  // Bump to top of in-memory list
  const i = allLeads.indexOf(lead);
  if(i > 0){ allLeads.splice(i,1); allLeads.unshift(lead); }
  filterLeads();
  // Write to sheet — AE FALSE, AF empty, V = new status
  const writes = [
    {col:'AE', val:'FALSE', input:'USER_ENTERED', label:'לא נענו'},
    {col:'AF', val:'',      input:'RAW',          label:'תאריך לא נענו'},
    {col:'V',  val:lead.status, input:'RAW',     label:'סטטוס'},
  ];
  writes.forEach(w => {
    const url  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${w.col}${idx}?valueInputOption=${w.input}`;
    const opts = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[[w.val]]})};
    apiFetch(url, opts).catch(()=>enqueueWrite(url, opts, w.label));
  });
  appendMetaLog(idx, goingLeft ? 'הוסר' : 'הועבר להמשך');
  // Show ONE undo toast that restores both AE/AF and V
  const msg = goingLeft ? 'ליד הוסר' : 'ליד הועבר להמשך';
  showUndoToast(msg, () => {
    const lead2 = allLeads.find(l => l.index === idx);
    if(lead2){
      lead2.noAnswer   = prev.noAnswer;
      lead2.noAnswerTs = prev.noAnswerTs;
      lead2.status     = prev.status;
      lead2.movedAt    = prev.movedAt;
      const moves2 = loadMovesMap();
      if(prev.movedAt) moves2[idx] = prev.movedAt;
      else delete moves2[idx];
      saveMovesMap(moves2);
    }
    filterLeads();
    const undoWrites = [
      {col:'AE', val: prev.noAnswer ? 'TRUE' : 'FALSE', input:'USER_ENTERED', label:'ביטול לא נענו'},
      {col:'AF', val: prev.noAnswerTs ? String(prev.noAnswerTs) : '', input:'RAW', label:'ביטול תאריך לא נענו'},
      {col:'V',  val: prev.status, input:'RAW', label:'ביטול סטטוס'},
    ];
    undoWrites.forEach(w => {
      const url  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${w.col}${idx}?valueInputOption=${w.input}`;
      const opts = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[[w.val]]})};
      apiFetch(url, opts).catch(()=>enqueueWrite(url, opts, w.label));
    });
    appendMetaLog(idx, 'בוטל המעבר');
    showToast('המעבר בוטל', 'ok');
  });
}

/* Combined swipe action for the "פגישה" / "תזכורת" sub-tabs (swipe-right).
   Clears the date columns so the lead leaves the sub-tab, while keeping
   the status as CONTINUE. Snapshots all cleared values for undo. */
function _swipeClearMeetingReminder(idx, kind){
  const lead = allLeads.find(l => l.index === idx);
  if(!lead) return;
  // Column layout: meeting → X (date), Y (start), Z (end)
  //                reminder → AB (date), AC (start), AD (end)
  const cols = (kind === 'meeting')
    ? {date:'X', start:'Y', end:'Z'}
    : {date:'AB', start:'AC', end:'AD'};
  // Snapshot
  const prev = {
    dateRaw:   (kind === 'meeting') ? (lead.meetingDateRaw || '')   : (lead.reminderDateRaw || ''),
    dateMs:    (kind === 'meeting') ? (lead.meetingDateMs || 0)     : (lead.reminderDateMs || 0),
    startRaw:  (kind === 'meeting') ? (lead.meetingStartRaw || '')  : (lead.reminderStartRaw || ''),
    endRaw:    (kind === 'meeting') ? (lead.meetingEndRaw || '')    : (lead.reminderEndRaw || ''),
    lastSubTab: lead.lastSubTab || 'continue',
  };
  // Apply locally
  if(kind === 'meeting'){ lead.meetingDateRaw = ''; lead.meetingDateMs = 0; }
  else                  { lead.reminderDateRaw = ''; lead.reminderDateMs = 0; }
  lead.lastSubTab = 'continue';
  filterLeads();
  // Write blanks to the 3 columns
  const blank = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[['']]})};
  ['date','start','end'].forEach(k => {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${cols[k]}${idx}?valueInputOption=RAW`;
    apiFetch(url, blank).catch(()=>enqueueWrite(url, blank, 'נקה ' + cols[k]));
  });
  appendMetaLog(idx, kind === 'meeting' ? 'בוטלה פגישה' : 'בוטלה תזכורת');
  // Single undo toast that restores the 3 cleared cells + local state
  const msg = (kind === 'meeting') ? 'הפגישה בוטלה' : 'התזכורת בוטלה';
  showUndoToast(msg, () => {
    const lead2 = allLeads.find(l => l.index === idx);
    if(lead2){
      if(kind === 'meeting'){
        lead2.meetingDateRaw = prev.dateRaw;
        lead2.meetingDateMs  = prev.dateMs;
        lead2.meetingStartRaw = prev.startRaw;
        lead2.meetingEndRaw   = prev.endRaw;
      } else {
        lead2.reminderDateRaw = prev.dateRaw;
        lead2.reminderDateMs  = prev.dateMs;
        lead2.reminderStartRaw = prev.startRaw;
        lead2.reminderEndRaw   = prev.endRaw;
      }
      lead2.lastSubTab = prev.lastSubTab;
    }
    filterLeads();
    const writes = [
      {col: cols.date,  val: prev.dateRaw,  label:'שחזור תאריך'},
      {col: cols.start, val: prev.startRaw, label:'שחזור שעת התחלה'},
      {col: cols.end,   val: prev.endRaw,   label:'שחזור שעת סיום'},
    ];
    writes.forEach(w => {
      const url  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${w.col}${idx}?valueInputOption=RAW`;
      const opts = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[[w.val]]})};
      apiFetch(url, opts).catch(()=>enqueueWrite(url, opts, w.label));
    });
    appendMetaLog(idx, kind === 'meeting' ? 'שחזור פגישה' : 'שחזור תזכורת');
    showToast('בוטל', 'ok');
  });
}

/* Custom toast with an "undo" button. Stays on screen for 4 seconds.
   Tapping "ביטול" calls onUndo and dismisses immediately. Sits above
   regular .toast notifications so the two never collide. */
let _undoToastTimer = null;
let _undoToastHandler = null;
function showUndoToast(message, onUndo){
  // Close the keyboard if open — we want the user to see the toast
  // immediately, not have it hidden under the keyboard.
  try{
    const search = document.getElementById('search');
    if(search && document.activeElement === search) search.blur();
  }catch(_){}

  // Hide any plain toast that's currently showing — the undo toast is
  // strictly more useful (still tells you what happened, plus offers
  // an undo).
  document.querySelectorAll('.toast').forEach(t => t.remove());

  // Build (or reuse) the undo-toast host
  let host = document.getElementById('undo-toast');
  if(!host){
    host = document.createElement('div');
    host.id = 'undo-toast';
    document.body.appendChild(host);
  }
  // Reset cssText every time so older inline styles don't linger
  host.style.cssText = `
    position:fixed;left:50%;
    top:calc(56px + env(safe-area-inset-top));
    transform:translateX(-50%);
    background:#3a3a48;color:#fff;
    padding:0;
    display:flex;align-items:stretch;
    font-family:inherit;font-size:13px;font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
    z-index:9999;min-width:260px;max-width:92vw;
    direction:rtl;
    border:2px solid #fff;
    animation:undoToastIn .18s ease-out;
  `;
  // Make sure the keyframes are defined just once
  if(!document.getElementById('undo-toast-keyframes')){
    const st = document.createElement('style');
    st.id = 'undo-toast-keyframes';
    st.textContent = '@keyframes undoToastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}';
    document.head.appendChild(st);
  }
  host.innerHTML = `
    <span id="undo-toast-msg" style="flex:1;line-height:1.3;padding:14px 16px;display:flex;align-items:center"></span>
    <button id="undo-toast-btn" type="button" style="
      background:#e74c3c;border:0;
      color:#fff;padding:0 22px;font-size:14px;font-weight:800;
      font-family:inherit;cursor:pointer;flex-shrink:0;
      border-right:2px solid #fff;
      letter-spacing:.5px;
      min-width:80px;
      touch-action:manipulation;
    ">ביטול</button>
  `;
  document.getElementById('undo-toast-msg').textContent = message || 'בוצע';

  // Replace any previous timer + handler
  if(_undoToastTimer){ clearTimeout(_undoToastTimer); _undoToastTimer = null; }
  const close = () => {
    if(host) host.style.display = 'none';
    if(_undoToastTimer){ clearTimeout(_undoToastTimer); _undoToastTimer = null; }
    _undoToastHandler = null;
  };
  _undoToastHandler = () => {
    close();
    if(typeof onUndo === 'function'){
      try{ onUndo(); }
      catch(e){ console.error('undo failed:', e); }
    }
  };
  // Wire both click AND touchend (for stubborn iOS Safari) and use
  // pointerdown as a third belt-and-braces — only one fires per tap
  // because we close() immediately, removing the listener.
  const btn = document.getElementById('undo-toast-btn');
  const fire = (e) => {
    if(e){ e.stopPropagation(); e.preventDefault(); }
    if(_undoToastHandler) _undoToastHandler();
  };
  btn.addEventListener('click', fire);
  btn.addEventListener('touchend', fire);

  // 4 seconds to give the user a comfortable window to react
  _undoToastTimer = setTimeout(close, 4000);
}

// Append an entry to the metadata log column (AB). Each entry is one line:
// "DD/MM/YY HH:MM | userTag | event". Newest entries go on top.
// Failures are queued like every other write so we never lose history.
async function appendMetaLog(idx, event){
  const lead=allLeads.find(l=>l.index===idx);
  const ts=getTS(); // already includes user tag in format "DD/MM/YY HH:MM | tag"
  const newEntry=`${ts} | ${event}`;
  const prev=lead?(lead.metaLog||''):'';
  const combined=prev?(newEntry+'\n'+prev):newEntry;
  if(lead) lead.metaLog=combined;
  // Audit log column moved from AB → AG so the reminder columns
  // (AB/AC/AD) can hold their own data without conflict.
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/AG${idx}?valueInputOption=RAW`;
  const opts={method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[[combined]]})};
  apiFetch(url,opts).catch(()=>enqueueWrite(url,opts,'יומן ליד'));
}

/* Reset call display (dots) — visual only, does not write to sheet */
function resetCallDisplay(idx){
  const lead = allLeads.find(l => l.index === idx);
  if(!lead) return;
  lead._displayCallCount = 0;   // local override
  lead.callCount = 0;
  filterLeads();
}

async function markCalled(idx){
  const tag=getUserTag().toLowerCase();
  if(!tag)return;
  const lead=allLeads.find(l=>l.index===idx);
  // Append on EVERY call (not deduped). The total call count is just the
  // length of this list — that's what drives the dot indicator above each
  // lead's name. Same user calling 3 times → 3 entries, 3 red dots.
  let list=lead&&lead.callers?lead.callers.split(',').map(s=>s.trim()).filter(Boolean):[];
  list.push(tag);
  const newVal=list.join(', ');
  if(lead){
    lead.callers=newVal;
    lead.callCount=list.length;
  }
  filterLeads();
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/W${idx}?valueInputOption=RAW`;
  const opts={method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[[newVal]]})};
  apiFetch(url,opts).catch(()=>enqueueWrite(url,opts,'סימון מתקשר'));
  // Add to the audit log too
  appendMetaLog(idx, 'שיחה יצאה');
}

/* =========================
   FILTER & RENDER (search applies to all tabs)
   ========================= */
function filterLeads(){
  const q=document.getElementById('search').value.toLowerCase();
  const match=l=>l.name.toLowerCase().includes(q)||l.phone.includes(q)||l.note.toLowerCase().includes(q);

  // ─── search semantics ─────────────────────────────────────────────
  // The "active" (לידים) tab searches across EVERY tab and EVERY
  // sub-tab — so the user can always find any lead from there.
  // Any other tab searches ONLY its own scope (its tab + its current
  // sub-tab). This way each tab/sub-tab is self-contained.
  const searching = q.trim().length > 0;

  // ── ACTIVE TAB: when searching, show all matches regardless of
  // status/noAnswer/sub-tab. Otherwise normal active filter. ──
  let active;
  if(searching && currentTab === 'active'){
    // Cross-tab search: show every matching lead (excluding removed,
    // since those are intentionally hidden until you go to that tab)
    active = allLeads.filter(l => match(l) && l.status !== STATUS_REMOVED);
  } else {
    active = allLeads.filter(l =>
      (!l.status || l.status===STATUS_ACTIVE) && !l.noAnswer && match(l)
    );
  }

  // ── CONTINUE / MEETING / REMINDER / NOANSWER ──
  // Each of these is its own scope. When searching from one of these,
  // only that scope is searched. When searching from "active", these
  // remain showing their normal contents (the active tab handles the
  // global search alone).
  const allCont = allLeads.filter(l =>
    l.status===STATUS_CONTINUE && !l.noAnswer
  );

  // Decide whether to apply the search query to each list. The rule:
  //   - If we're on a continue sub-tab AND searching → only that sub-tab matches
  //   - If we're on active AND searching → don't apply search to other sub-tabs
  //     (active tab already shows all matches above)
  //   - If we're not searching → all sub-tabs show their natural contents
  const applyMatchTo = (subtab) => {
    if(!searching) return true;  // no search → keep everything
    if(currentTab === 'active') return true;  // we don't filter other lists here
    if(currentTab === 'continue' && _continueSubtab === subtab) return false;  // we'll filter below
    return true;  // not the focused sub-tab — keep as-is
  };

  const cont     = allCont.filter(l => (l.lastSubTab === 'continue' || !l.lastSubTab) && (applyMatchTo('continue') ? true : match(l)));
  const meeting  = allCont.filter(l => l.lastSubTab === 'meeting'  && (applyMatchTo('meeting')  ? true : match(l)));
  const reminder = allCont.filter(l => l.lastSubTab === 'reminder' && (applyMatchTo('reminder') ? true : match(l)));
  // For non-search render, also apply match (since user might still have a query):
  // simplify the logic: if searching but not in active tab, ONLY the focused sub-tab gets filtered
  let contFinal     = (searching && currentTab === 'continue' && _continueSubtab === 'continue') ? cont.filter(match)     : cont;
  let meetingFinal  = (searching && currentTab === 'continue' && _continueSubtab === 'meeting')  ? meeting.filter(match)  : meeting;
  let reminderFinal = (searching && currentTab === 'continue' && _continueSubtab === 'reminder') ? reminder.filter(match) : reminder;
  // When in active tab with no search, normal continue contents (no match needed).
  // When in active tab WITH search, the active list already shows everything;
  // here we want continue/meeting/reminder to remain "default" — but we still
  // apply match to keep them honest only on the active tab. Default to no-match-filter.
  if(currentTab === 'active' && searching){
    // the user is searching from "active", they want a global view.
    // The other tabs continue to show their natural contents (no match filter).
    contFinal = cont; meetingFinal = meeting; reminderFinal = reminder;
  }

  // No-answer: same scoping rule
  let noAnsw = allLeads.filter(l => l.noAnswer)
    .sort((a,b) => (b.noAnswerTs||0) - (a.noAnswerTs||0));
  if(searching){
    if(currentTab === 'continue' && _continueSubtab === 'noanswer'){
      noAnsw = noAnsw.filter(match);
    } else if(currentTab === 'active'){
      // Active tab handles search globally — leave noAnsw unfiltered
    } else {
      // we're somewhere else (e.g. removed); leave noAnsw alone
    }
  }

  // Removed: only searched when actually on that tab
  let rem = allLeads.filter(l => l.status===STATUS_REMOVED && !l.noAnswer);
  if(searching && currentTab === 'removed'){
    rem = rem.filter(match);
  }

  renderLeads(active);
  renderContinue(contFinal);
  renderMeeting(meetingFinal);
  renderReminder(reminderFinal);
  renderRemoved(rem);
  renderNoAnswer(noAnsw);
  // Update the per-sub-tab pill counters
  const setCnt = (id, n)=>{ const el=document.getElementById(id); if(el) el.textContent = n ? '('+n+')' : ''; };
  setCnt('subtab-continue-count', contFinal.length);
  setCnt('subtab-meeting-count',  meetingFinal.length);
  setCnt('subtab-reminder-count', reminderFinal.length);
  setCnt('subtab-noanswer-count', noAnsw.length);
  // Header counter — depends on which sub-tab is showing inside "המשך"
  const headerCount = currentTab !== 'continue' ? ({active:active.length, removed:rem.length}[currentTab] || 0)
    : ({continue:contFinal.length, meeting:meetingFinal.length, reminder:reminderFinal.length, noanswer:noAnsw.length}[_continueSubtab] || contFinal.length);
  document.getElementById('lead-count').textContent = headerCount;
}

/* =========================
   CALL FLOW
   ========================= */
function callLead(idx,name,phone){
  currentLead={index:idx,name,phone};
  markCalled(idx);
  window.location.href='tel:'+phone.replace(/[^0-9+]/g,'');
  setTimeout(()=>openModal(name),1800);
}
// Anonymous call variant — prefixes the Israeli "block caller ID for this call"
// code (#31#) so the recipient sees "Unknown number". Same call-summary flow
// afterwards. The "%23" is the URL-encoded form of "#" (mandatory in tel: URIs).
function callLeadAnonymous(idx,name,phone){
  currentLead={index:idx,name,phone};
  markCalled(idx);
  const cleaned=phone.replace(/[^0-9+]/g,'');
  window.location.href='tel:%2331%23'+cleaned;
  setTimeout(()=>openModal(name),1800);
}
// Open the same summary modal but WITHOUT making a phone call.
// Saving uses the same flow (saveNote -> column C with timestamp + user tag).
function addNote(idx,name){
  const lead=allLeads.find(l=>l.index===idx);
  const phone=lead?lead.phone:'';

}
// Tapping the phone button inside the call-summary modal — fires a tel:
// to the current lead and marks the call. The note-modal STAYS OPEN
// underneath so when the user finishes the call (or returns from the
// phone app), they're back on the summary modal ready to type notes.
function callCurrentLead(){
  if(!currentLead || !currentLead.phone){ showToast('אין מספר טלפון','err'); return; }
  markCalled(currentLead.index);
  // Remember which lead we called so we can re-open the note-modal
  // for that exact lead when focus returns from the dialer.
  _recentlyCalledLead = currentLead;
  _recentlyCalledAt = Date.now();
  // Suppress popstate / visibilitychange noise while the OS dialer
  // is taking over the screen.
  _suppressPopstate = true;
  setTimeout(()=>{ _suppressPopstate = false; }, 4000);
  window.location.href='tel:'+currentLead.phone.replace(/[^0-9+]/g,'');
  // Re-assert the modal is open right after dial — some platforms
  // briefly hide our page then bring us back.
  setTimeout(()=>{
    if(!modalOpen) return;
    const nm = document.getElementById('note-modal');
    if(nm && !nm.classList.contains('open')) nm.classList.add('open');
  }, 500);
}

// Track the most recently dialed lead so we can re-open the call-summary
// modal automatically when focus returns from the dialer.
let _recentlyCalledLead = null;
let _recentlyCalledAt = 0;

/* When the app regains focus shortly after a call was placed, reopen
   the call-summary modal for that lead. This implements: "after I dial,
   the dialer takes over; when the OS hands control back, I want to be
   right inside the call-summary again — not on the leads list". */
function _maybeReopenCallSummary(){
  if(!_recentlyCalledLead) return;
  const elapsed = Date.now() - _recentlyCalledAt;
  // 5 minutes window — long enough for a real call, short enough that
  // an unrelated re-focus an hour later won't pop the modal.
  if(elapsed > 5 * 60 * 1000){
    _recentlyCalledLead = null;
    return;
  }
  // Only re-open if we don't already have the modal open.
  if(modalOpen) return;
  // Re-open for the specific lead that was called.
  currentLead = _recentlyCalledLead;
  openModal(_recentlyCalledLead.name || '');
  // Clear so we don't re-open again on every focus.
  _recentlyCalledLead = null;
}
window.addEventListener('focus', _maybeReopenCallSummary);
document.addEventListener('visibilitychange', () => {
  if(!document.hidden) _maybeReopenCallSummary();
});
window.addEventListener('pageshow', _maybeReopenCallSummary);

/* "לא נענו" button inside the call-summary modal. Closes the modal
   (saving any draft) and flags AE=TRUE for the current lead. */
function markCurrentLeadNoAnswer(){
  if(!currentLead) return;
  const idx = currentLead.index;
  // Save any draft note that was typed before flagging
  const note = document.getElementById('note-input').value.trim();
  if(history.state && history.state.page === 'modal') popHistorySilently();
  if(currentLead) localStorage.removeItem('draft_'+currentLead.index);
  _closeModalCore();
  if(note){
    const lead = allLeads.find(l => l.index === idx);
    const entry = getTS()+'\n'+note;
    const prev = lead ? lead.note : '';
    const combined = prev ? entry+'\n\n'+prev : entry;
    if(lead) lead.note = combined;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/C${idx}?valueInputOption=RAW`;
    const opts = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[[combined]]})};
    apiFetch(url, opts).catch(e => enqueueWrite(url, opts, 'סיכום שיחה'));
  }
  setNoAnswer(idx, true);
  showToast('סומן: לא נענו');
}

function openModal(name){
  document.getElementById('modal-name').textContent=name;
  // restore any saved draft for this lead
  const draftKey=currentLead?'draft_'+currentLead.index:null;
  const draft=draftKey?(localStorage.getItem(draftKey)||''):'';
  document.getElementById('note-input').value=draft;
  finalTranscript=draft;
  document.getElementById('note-modal').classList.add('open');
  modalOpen=true;
  // history entry so back button closes (and saves draft) instead of leaving
  history.pushState({page:'modal'},'');
  stopMic();
  // While the call-summary is open, lock the page underneath: ANY
  // downward swipe anywhere on the screen closes the modal (saving the
  // draft) and is fully consumed — no pull-to-refresh, no rubber-banding,
  // no background scrolling.
  _attachNoteScrollLock();
  // Don't auto-focus the textarea — the keyboard popping up is annoying when
  // the user just wants to tap one of the action buttons (continue/meeting/
  // reminder/remove). Some browsers/Android WebView auto-focus the first
  // input/textarea in a newly-shown container, so we explicitly blur whatever
  // ended up focused on the next two paint frames.
  const blurAny=()=>{
    const a=document.activeElement;
    if(a && (a.tagName==='TEXTAREA' || a.tagName==='INPUT')) a.blur();
  };
  requestAnimationFrame(()=>{ blurAny(); requestAnimationFrame(blurAny); });
  setTimeout(blurAny, 60);
}

/* ── Global scroll-lock for the call-summary modal ──────────────────
   Goal: while the modal is open, ANY downward swipe anywhere on the
   screen should close the modal and do nothing else — no page scroll,
   no pull-to-refresh, no rubber-banding behind the sheet.

   Strategy:
   1. Lock body scroll via overflow:hidden + overscroll-behavior:none
      (the second one disables pull-to-refresh on Chrome Android).
   2. Add a document-level touchmove listener with {passive:false} that
      preventDefault()s every move while the modal is open. The same
      listener detects a meaningful downward swipe and triggers close.
   3. Allow scrolling INSIDE the textarea (the only scrollable area
      that should still respond) — we skip the prevent + close logic
      when the touch started on the textarea AND its content overflows. */
let _noteScrollLock = null;
function _attachNoteScrollLock(){
  if(_noteScrollLock) return; // already attached
  // Lock the body so the page can't scroll behind the modal.
  const prevBodyOverflow = document.body.style.overflow;
  const prevBodyOverscroll = document.body.style.overscrollBehavior;
  const prevHtmlOverscroll = document.documentElement.style.overscrollBehavior;
  document.body.style.overflow = 'hidden';
  document.body.style.overscrollBehavior = 'none';
  document.documentElement.style.overscrollBehavior = 'none';

  let startY = 0, startedInScrollable = false;
  const noteSheet = document.querySelector('#note-modal .modal-sheet');
  const textarea = document.getElementById('note-input');

  const onStart = (e)=>{
    if(!modalOpen){ return; }
    // If the calendar overlay is open ON TOP of the note modal, defer
    // all touch handling to the calendar's own handlers — the note
    // modal's lock must NOT close anything while the user is in the
    // calendar.
    const calOpen = document.getElementById('calendar-modal');
    if(calOpen && calOpen.style.display === 'flex') return;
    if(!e.touches || !e.touches[0]) return;
    startY = e.touches[0].clientY;
    // If the touch started inside the textarea AND it overflows, allow
    // native scrolling there (we won't preventDefault for that case).
    startedInScrollable = false;
    if(textarea && textarea.contains(e.target)){
      const canScroll = textarea.scrollHeight > textarea.clientHeight;
      if(canScroll) startedInScrollable = true;
    }
  };

  const onMove = (e)=>{
    if(!modalOpen) return;
    // Calendar overlay open? Bail — let the calendar own the gestures.
    const calOpen = document.getElementById('calendar-modal');
    if(calOpen && calOpen.style.display === 'flex') return;
    if(!e.touches || !e.touches[0]) return;
    const dy = e.touches[0].clientY - startY;
    // Allow native scrolling inside the textarea (when it actually scrolls)
    if(startedInScrollable){
      // But still close on big downward swipes from inside the textarea
      // when the textarea is scrolled to its top.
      if(dy > 80 && textarea && textarea.scrollTop <= 0){
        if(e.cancelable) e.preventDefault();
        _closeNoteOnSwipe();
      }
      return;
    }
    // Default: block ANY page movement while the modal is open.
    if(e.cancelable) e.preventDefault();
    // A meaningful downward swipe → close the modal.
    if(dy > 60){
      _closeNoteOnSwipe();
    }
  };

  // Wheel: also block scrolling on desktop / mouse wheel.
  const onWheel = (e)=>{
    if(!modalOpen) return;
    const calOpen = document.getElementById('calendar-modal');
    if(calOpen && calOpen.style.display === 'flex') return;
    if(textarea && textarea.contains(e.target)){
      const canScroll = textarea.scrollHeight > textarea.clientHeight;
      if(canScroll) return; // let the textarea scroll normally
    }
    if(e.cancelable) e.preventDefault();
    if(e.deltaY > 30){
      _closeNoteOnSwipe();
    }
  };

  document.addEventListener('touchstart', onStart, {passive:true});
  document.addEventListener('touchmove',  onMove,  {passive:false});
  document.addEventListener('wheel',      onWheel, {passive:false});

  _noteScrollLock = ()=>{
    document.removeEventListener('touchstart', onStart);
    document.removeEventListener('touchmove',  onMove);
    document.removeEventListener('wheel',      onWheel);
    document.body.style.overflow = prevBodyOverflow;
    document.body.style.overscrollBehavior = prevBodyOverscroll;
    document.documentElement.style.overscrollBehavior = prevHtmlOverscroll;
    _noteScrollLock = null;
  };
}

function _detachNoteScrollLock(){
  if(_noteScrollLock) _noteScrollLock();
}

/* Close the modal due to a swipe gesture: save the draft (so what the
   user typed isn't lost) and animate the sheet out. */
let _swipeCloseInFlight = false;
function _closeNoteOnSwipe(){
  if(_swipeCloseInFlight) return;
  _swipeCloseInFlight = true;
  const sheet = document.querySelector('#note-modal .modal-sheet');
  if(sheet){
    sheet.style.transition = 'transform 0.18s cubic-bezier(.32,.72,0,1)';
    sheet.style.transform = 'translateY(100%)';
  }
  setTimeout(()=>{
    if(sheet){ sheet.style.transition=''; sheet.style.transform=''; }
    saveDraftAndCloseModal();
    _swipeCloseInFlight = false;
  }, 180);
}
function closeModal(){
  // user clicked "סגור בלי לשמור" -> drop the draft
  if(currentLead)localStorage.removeItem('draft_'+currentLead.index);
  _closeModalCore();
  if(history.state&&history.state.page==='modal') popHistorySilently();
}
function saveDraftAndCloseModal(){
  // back button -> persist whatever was typed for next time
  const txt=document.getElementById('note-input').value;
  if(currentLead){
    if(txt&&txt.trim())localStorage.setItem('draft_'+currentLead.index,txt);
    else localStorage.removeItem('draft_'+currentLead.index);
  }
  _closeModalCore();
  if(txt&&txt.trim())showToast('טיוטה נשמרה');
}
function _closeModalCore(){
  document.getElementById('note-modal').classList.remove('open');
  modalOpen=false;
  stopMic();
  // Release the page-wide scroll lock that openModal installed.
  if(typeof _detachNoteScrollLock === 'function') _detachNoteScrollLock();
  // Don't re-render the list here — closing without saving shouldn't cause
  // a visible flash. Save flows (saveAndMove etc.) trigger their own
  // filterLeads() so the UI stays in sync when there's an actual change.
  // If the user opened this modal from inside the log viewer, return them there
  if(_logViewReopenIndex!=null){
    const idx=_logViewReopenIndex;
    _logViewReopenIndex=null;
    setTimeout(()=>openLogView(idx), 60);
  }
}

// History navigation pattern: every inner window pushes a history entry
// when it opens. The back button (popstate) closes the current window and
// goes one level back. Programmatic close → use popHistorySilently to pop
// without re-running the popstate logic (avoids cascading closes).
let _suppressPopstate=false;
function popHistorySilently(){
  _suppressPopstate=true;
  history.back();
  setTimeout(()=>{_suppressPopstate=false;},120);
}

let _logViewLead=null;
// When the user clicks "הוסף סיכום שיחה" inside the log viewer, we close the
// viewer and open the note modal. Store the lead index here so we can reopen
// the log viewer after the modal closes.
let _logViewReopenIndex=null;
let _logExpandAll=false; // tracks whether all entries are expanded in the viewer
function openLogView(idx){
  const l=allLeads.find(x=>x.index===idx);
  if(!l)return;
  _logViewLead=l;
  _logExpandAll=false;
  document.getElementById('log-view-name').textContent=l.name+(l.phone?` • ${l.phone}`:'');
  renderLogViewContent();
  document.getElementById('log-view-modal').classList.add('open');
  history.pushState({page:'logview'},'');
}
function renderLogViewContent(){
  const l=_logViewLead; if(!l)return;
  const entries=parseEntries(l.note||'');
  const wrap=document.getElementById('log-view-content');
  if(!entries.length){
    wrap.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">אין סיכומי שיחות עדיין</div>';
    return;
  }
  // Header row with the global expand/collapse toggle
  const toggleLabel=_logExpandAll?'צמצם הכל':'הרחב הכל';
  const toggleIcon=_logExpandAll?ICON.chevronR:ICON.plus;
  const header=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
    <button class="expand-all-btn" onclick="toggleLogExpandAll()">${toggleIcon}<span>${toggleLabel}</span></button>
  </div>`;
  wrap.innerHTML=header+entries.map((en,i)=>{
    const lines=en.split('\n');
    const head=lines[0]||'';
    const isHead=/^\d{2}\/\d{2}\/\d{2}/.test(head.trim());
    const body=isHead?lines.slice(1).join('\n'):en;
    let tsDisplay='',userTag='';
    if(isHead){
      const parts=head.split('|');
      tsDisplay=parts[0].trim();
      userTag=parts[1]?parts[1].trim():'';
    }
    const expandedCls=_logExpandAll?' expanded':'';
    return `<div class="entry-card${expandedCls}" onclick="toggleEntryCard(this)">
      ${tsDisplay?`<div class="entry-ts">${esc(tsDisplay)}${userTag?`<span class="entry-user">${esc(userTag)}</span>`:''}</div>`:''}
      <div class="entry-body">${esc(body.trim())}</div>
      <button onclick="event.stopPropagation();openEditEntry(${l.index},${i})" class="note-entry-edit" title="ערוך סיכום זה">${ICON.pencil}</button>
    </div>`;
  }).join('');
}
// Toggle expand/collapse state of a single entry card
function toggleEntryCard(el){
  if(!el)return;
  el.classList.toggle('expanded');
}
// Toggle expand state for all entries in the currently-open log viewer
function toggleLogExpandAll(){
  _logExpandAll=!_logExpandAll;
  renderLogViewContent();
}
function closeLogView(){
  document.getElementById('log-view-modal').classList.remove('open');
  if(history.state&&history.state.page==='logview') popHistorySilently();
  _logViewLead=null;
}

/* ═══════════════════════════════════════════════════════════
   GOOGLE CALENDAR OVERLAY
   Shows the user's primary Google Calendar in a month view.
   Tapping a day reveals that day's events. Background is fully
   blocked. Tapping the backdrop or dragging diagonally closes.
   ═══════════════════════════════════════════════════════════ */
let _calMonth = null;          // {y, m} of currently displayed month
let _calSelected = null;       // 'YYYY-MM-DD' of selected day
let _calEventsByDay = {};      // 'YYYY-MM-DD' → [events]
let _calLoadedRanges = new Set(); // 'YYYY-MM' that we've already fetched

function openCalendarOverlay(){
  const today = new Date();
  _calMonth = {y: today.getFullYear(), m: today.getMonth()};
  _calSelected = _calFmtDay(today);
  document.getElementById('calendar-modal').style.display = 'flex';
  // Don't push a separate history entry — this lets us close the
  // calendar without triggering popstate (which would also close
  // whatever modal is underneath, like the call-summary note-modal).
  // The user closes via tap on backdrop, diagonal swipe, or "סגירה" button.
  _calRender();
  _calLoadMonth(_calMonth.y, _calMonth.m);
}
function closeCalendarOverlay(){
  document.getElementById('calendar-modal').style.display = 'none';
  // Intentionally NOT calling history.back() / popHistorySilently here.
  // The calendar didn't add its own history entry, so closing it must
  // not pop anything — otherwise it would also close the note-modal
  // (call-summary) that sits underneath, which is exactly what the
  // user complained about.
}

function _calFmtDay(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function _calNiceTime(iso){
  // Returns HH:MM for a given ISO string, or '' for all-day
  if(!iso) return '';
  if(iso.length === 10) return '';   // YYYY-MM-DD = all-day
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '';
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
const _CAL_HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
// Shown days: Sunday..Friday (no Saturday). Index 0..5 = Sun..Fri.
const _CAL_HEB_WEEKDAYS = ['א','ב','ג','ד','ה','ו'];
const _CAL_HEB_WEEKDAYS_FULL = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function calNavMonth(delta){
  if(!_calMonth) return;
  let y = _calMonth.y, m = _calMonth.m + delta;
  while(m < 0){ m += 12; y--; }
  while(m > 11){ m -= 12; y++; }
  _calMonth = {y, m};
  _calRender();
  _calLoadMonth(y, m);
}
function calNavToday(){
  const today = new Date();
  _calMonth = {y: today.getFullYear(), m: today.getMonth()};
  _calSelected = _calFmtDay(today);
  _calRender();
  _calLoadMonth(_calMonth.y, _calMonth.m);
}

function _calRender(){
  if(!_calMonth) return;
  const {y, m} = _calMonth;
  document.getElementById('cal-month-label').textContent = _CAL_HEB_MONTHS[m] + ' ' + y;
  document.getElementById('cal-day-label').textContent = '';

  // Build the month grid SKIPPING Saturday entirely (Israeli weekend
  // rest day). 6 columns instead of 7 (Sun..Fri).
  // Saturday events are silently merged into Friday for visibility.
  const first = new Date(y, m, 1);
  const startWeekdayRaw = first.getDay();       // 0=Sun, 6=Sat
  // If month starts on Saturday, treat as Sunday-of-next-week for grid alignment.
  const startWeekday = startWeekdayRaw === 6 ? 0 : startWeekdayRaw;
  const daysInThisMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const today = _calFmtDay(new Date());

  // Header row: weekday names — Sun..Fri only (6 columns)
  let html = _CAL_HEB_WEEKDAYS.map(d => `<div class="cal-day-weekday">${d}</div>`).join('');

  // We render 6 weeks × 6 columns = 36 cells, walking actual dates
  // and skipping Saturdays.
  let cellsRendered = 0;
  let cy = y, cm = m;
  // Find the first cell's date — go back from m/1 by startWeekday days
  let cur = new Date(y, m, 1 - startWeekday);
  // If we landed on a Saturday, advance one day
  if(cur.getDay() === 6) cur.setDate(cur.getDate() + 1);

  while(cellsRendered < 36){
    if(cur.getDay() === 6){ cur.setDate(cur.getDate()+1); continue; }  // skip Saturday
    const key = _calFmtDay(cur);
    const isOutside = (cur.getMonth() !== m);
    const isToday   = (key === today);
    const isSel     = (key === _calSelected);
    const events = _calEventsByDay[key] || [];
    const dots = events.slice(0, 4).map(()=>'<span class="cal-day-dot"></span>').join('');
    const cls = ['cal-day'];
    if(isOutside) cls.push('outside');
    if(isToday)   cls.push('today');
    if(isSel)     cls.push('selected');
    html += `<div class="${cls.join(' ')}" data-cal-day="${key}" data-cal-y="${cur.getFullYear()}" data-cal-m="${cur.getMonth()}">
      <span class="cal-day-num">${cur.getDate()}</span>
      ${dots ? `<div class="cal-day-dots">${dots}</div>` : ''}
    </div>`;
    cur.setDate(cur.getDate()+1);
    cellsRendered++;
  }
  document.getElementById('cal-month-grid').innerHTML = html;

  // Render selected day's events
  _calRenderDay();
}
function _calRenderDay(){
  if(!_calSelected) return;
  const allEvents = (_calEventsByDay[_calSelected] || [])
    .slice()
    .sort((a,b) => (a._sort||0) - (b._sort||0));
  const [yy, mm, dd] = _calSelected.split('-').map(Number);
  const date = new Date(yy, mm-1, dd);
  const wd = _CAL_HEB_WEEKDAYS_FULL[date.getDay()];
  document.getElementById('cal-selected-label').textContent = `יום ${wd}, ${dd}/${mm}/${yy}`;

  // Filter: hide events that end before 8:00 AM. Keep all-day events.
  // Also hide events on Saturday entirely (we don't show Saturday in
  // the grid, but a multi-day event might span into it).
  const events = allEvents.filter(ev => {
    if(date.getDay() === 6) return false;  // Saturday — hidden
    const startStr = (ev.start && (ev.start.dateTime||ev.start.date)) || '';
    const endStr   = (ev.end   && (ev.end.dateTime  ||ev.end.date  )) || startStr;
    if(startStr.length === 10) return true;  // all-day → keep
    const endHour = new Date(endStr).getHours() + (new Date(endStr).getMinutes()/60);
    return endHour > 8;  // event ends after 8:00 → keep
  });

  document.getElementById('cal-event-count').textContent = events.length ? `(${events.length} אירועים)` : '';

  const list = document.getElementById('cal-events-list');
  if(!events.length){
    list.innerHTML = '<div class="cal-empty">אין אירועים ביום זה — פנוי</div>';
    return;
  }

  // Build a clear time-grid layout. Hours from 8:00 to 22:00, each hour
  // is one row. Events are placed by their start hour.
  const HOUR_START = 8;
  const HOUR_END = 22;
  const allDay = events.filter(ev => {
    const s = ev.start && (ev.start.dateTime||ev.start.date);
    return !s || s.length === 10;
  });
  const timed = events.filter(ev => {
    const s = ev.start && (ev.start.dateTime||ev.start.date);
    return s && s.length !== 10;
  });

  let html = '';
  if(allDay.length){
    html += '<div class="cal-allday-section">' +
      allDay.map(ev => `
        <div class="cal-evt cal-evt-allday">
          <div class="cal-evt-time">יום שלם</div>
          <div class="cal-evt-title">${esc(ev.summary || '(ללא שם)')}</div>
          ${ev.location ? `<div class="cal-evt-loc">${esc(ev.location)}</div>` : ''}
        </div>`).join('') + '</div>';
  }

  // Group timed events by hour
  html += '<div class="cal-hourgrid">';
  for(let h = HOUR_START; h <= HOUR_END; h++){
    const hourEvents = timed.filter(ev => {
      const startD = new Date(ev.start.dateTime || ev.start.date);
      return startD.getHours() === h;
    });
    const isCurrent = (date.toDateString() === new Date().toDateString())
      && new Date().getHours() === h;
    html += `
      <div class="cal-hour-row${isCurrent?' cal-hour-now':''}">
        <div class="cal-hour-label">${String(h).padStart(2,'0')}:00</div>
        <div class="cal-hour-content">
          ${hourEvents.length ? hourEvents.map(ev => {
            const startT = _calNiceTime(ev.start.dateTime || ev.start.date);
            const endT   = _calNiceTime(ev.end && (ev.end.dateTime || ev.end.date));
            const time = endT ? startT+' – '+endT : startT;
            return `
              <div class="cal-evt">
                <div class="cal-evt-time">${esc(time)}</div>
                <div class="cal-evt-title">${esc(ev.summary || '(ללא שם)')}</div>
                ${ev.location ? `<div class="cal-evt-loc">${esc(ev.location)}</div>` : ''}
              </div>`;
          }).join('') : ''}
        </div>
      </div>`;
  }
  html += '</div>';

  list.innerHTML = html;
}

/* Fetch events for an entire month from Google Calendar API. We cache
   per month so navigating back & forth is instant. */
async function _calLoadMonth(y, m){
  const key = y+'-'+String(m+1).padStart(2,'0');
  if(_calLoadedRanges.has(key)) return;

  const start = new Date(y, m, 1);
  const end   = new Date(y, m+1, 1);
  const params = new URLSearchParams({
    timeMin: start.toISOString(),
    timeMax: end.toISOString(),
    singleEvents: 'true',
    orderBy: 'startTime',
    maxResults: '250',
  });
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?' + params.toString();
  // Show a loading indicator while we fetch
  const listEl = document.getElementById('cal-events-list');
  if(listEl && !_calLoadedRanges.size){
    listEl.innerHTML = '<div class="cal-empty">טוען אירועים מקלנדר Google…</div>';
  }
  try{
    const data = await apiFetch(url);
    const items = (data && data.items) || [];
    items.forEach(ev => {
      // Each event spans from ev.start.date(Time) to ev.end.date(Time).
      // For multi-day events, add it to every day in the range.
      const startStr = (ev.start && (ev.start.dateTime || ev.start.date)) || '';
      const endStr   = (ev.end   && (ev.end.dateTime   || ev.end.date  )) || startStr;
      const startDay = startStr ? new Date(startStr) : null;
      const endDay   = endStr   ? new Date(endStr)   : startDay;
      if(!startDay) return;
      ev._sort = startDay.getTime();
      // Walk day by day (cap at 31 to be safe)
      const cur = new Date(startDay.getFullYear(), startDay.getMonth(), startDay.getDate());
      const stopAt = endStr.length === 10
        ? new Date(endDay.getFullYear(), endDay.getMonth(), endDay.getDate())  // exclusive
        : new Date(endDay.getFullYear(), endDay.getMonth(), endDay.getDate()+1);
      let safety = 31;
      while(cur < stopAt && safety-- > 0){
        const k = _calFmtDay(cur);
        if(!_calEventsByDay[k]) _calEventsByDay[k] = [];
        if(!_calEventsByDay[k].some(x => x.id === ev.id)){
          _calEventsByDay[k].push(ev);
        }
        cur.setDate(cur.getDate()+1);
      }
    });
    _calLoadedRanges.add(key);
    _calRender();
  }catch(e){
    const msg = String(e.message || e || '');
    console.error('Calendar fetch failed:', msg);

    // Calendar API not enabled in the Google Cloud project — this is a
    // one-time admin task. Show a clear instruction with the link to
    // enable it in Google Cloud Console.
    const apiNotEnabled = /has not been used in project|API has not been used|disabled\.\s*Enable it|console\.developers\.google\.com\/apis\/api\/calendar/i.test(msg);
    if(apiNotEnabled){
      // Try to extract the project number from the error message so we
      // can build the exact "enable" URL Google offers.
      const projMatch = msg.match(/project\s+(\d+)/);
      const projNum = projMatch ? projMatch[1] : '';
      const enableUrl = projNum
        ? `https://console.developers.google.com/apis/api/calendar-json.googleapis.com/overview?project=${projNum}`
        : 'https://console.developers.google.com/apis/api/calendar-json.googleapis.com/overview';
      document.getElementById('cal-events-list').innerHTML = `
        <div class="cal-empty" style="padding:18px;line-height:1.7;text-align:right">
          <div style="margin-bottom:10px;font-weight:700;color:var(--red)">Google Calendar API לא מופעל</div>
          <div style="margin-bottom:12px;color:var(--text);font-style:normal">
            יש להפעיל את ה-API פעם אחת ב-Google Cloud Console:
          </div>
          <div style="margin-bottom:14px;color:var(--text);font-style:normal">
            1. <a href="${esc(enableUrl)}" target="_blank" rel="noopener" style="color:#3A5BB0;text-decoration:underline;font-weight:700">פתח את הקישור הזה</a><br>
            2. לחץ על <strong>ENABLE</strong><br>
            3. המתן 1-2 דקות ונסה שוב
          </div>
          <button onclick="_calRetry()" style="background:var(--slate);color:#fff;border:none;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit">נסה שוב</button>
        </div>`;
      return;
    }

    // ANY auth-related error (insufficient scope, 401, 403, ACCESS_TOKEN_SCOPE_INSUFFICIENT)
    // means the token was issued before we added the calendar scope.
    // Show a clear "re-connect" button that signs out and back in
    // so Google issues a new token with the calendar.readonly scope.
    const looksLikeAuth = /forbidden|insufficientPermissions|403|401|invalid_scope|insufficient|ACCESS_TOKEN/i.test(msg);
    if(looksLikeAuth || !msg){
      document.getElementById('cal-events-list').innerHTML = `
        <div class="cal-empty" style="padding:18px;line-height:1.6">
          <div style="margin-bottom:10px;font-weight:700;color:var(--text)">דרושה הרשאה לקלנדר Google</div>
          <div style="margin-bottom:14px;color:var(--muted);font-style:normal">
            כדי לראות את האירועים שלך, צריך לאשר ל-Google שהאפליקציה תוכל לקרוא מהקלנדר. לחץ על הכפתור למטה — תועבר ל-Google לאישור, ואז תחזור לאפליקציה.
          </div>
          <button onclick="_calReauth()" style="background:var(--slate);color:#fff;border:none;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
            אשר חיבור לקלנדר
          </button>
          <div style="margin-top:14px;font-size:10px;color:var(--muted);font-style:normal">פרטי שגיאה: ${esc(msg||'unknown')}</div>
        </div>`;
      try{ localStorage.setItem('lte','0'); }catch(_){}
      return;
    }
    // Some other error (network/timeout/quota) — show generic + retry
    document.getElementById('cal-events-list').innerHTML = `
      <div class="cal-empty" style="padding:18px">
        <div style="color:var(--text);margin-bottom:10px">שגיאה בטעינת קלנדר</div>
        <div style="color:var(--muted);margin-bottom:12px;font-style:normal">${esc(msg)}</div>
        <button onclick="_calRetry()" style="background:var(--slate);color:#fff;border:none;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit">נסה שוב</button>
      </div>`;
  }
}

/* User clicked "אשר חיבור לקלנדר" — sign out and back in so the
   new sign-in flow includes the calendar.readonly scope. */
function _calReauth(){
  try{
    // Clear cached token and expiry, but keep the saved email so the
    // user doesn't have to type it again.
    localStorage.removeItem('lt');
    localStorage.setItem('lte','0');
  }catch(_){}
  closeCalendarOverlay();
  // doLogin() opens the OAuth dialog with the full SCOPES list. Once
  // approved, the user can re-open the calendar and it will work.
  if(typeof doLogin === 'function'){
    doLogin();
  } else {
    // Fallback: full reload to trigger sign-in flow
    location.reload();
  }
}
function _calRetry(){
  if(!_calMonth) return;
  _calLoadedRanges.delete(_calMonth.y+'-'+String(_calMonth.m+1).padStart(2,'0'));
  _calLoadMonth(_calMonth.y, _calMonth.m);
}

// Click handler: choose a day, or close on backdrop tap.
// We stop propagation so the click doesn't bubble down to handlers
// that might think the user clicked outside the call-summary modal.
document.addEventListener('click', function(e){
  if(e.target && e.target.id === 'calendar-backdrop'){
    e.stopPropagation();
    e.preventDefault();
    closeCalendarOverlay();
    return;
  }
  const day = e.target && e.target.closest && e.target.closest('[data-cal-day]');
  if(day){
    const k = day.getAttribute('data-cal-day');
    if(k){
      _calSelected = k;
      const cy = parseInt(day.getAttribute('data-cal-y'), 10);
      const cm = parseInt(day.getAttribute('data-cal-m'), 10);
      if(!isNaN(cy) && !isNaN(cm) && (cy !== _calMonth.y || cm !== _calMonth.m)){
        _calMonth = {y:cy, m:cm};
        _calLoadMonth(cy, cm);
      }
      _calRender();
    }
  }
});

// Diagonal-up-right swipe to close. Only closes when the gesture
// moves UP and to the RIGHT (towards the top-right corner) — this
// avoids accidentally closing on regular scroll attempts.
(function attachCalendarSwipe(){
  const modal = document.getElementById('calendar-modal');
  if(!modal) return;
  let sx = 0, sy = 0, tracking = false;
  modal.addEventListener('touchstart', e => {
    if(e.target && e.target.closest && e.target.closest('#cal-events-list')) return;
    if(e.target && e.target.closest && e.target.closest('#cal-month-grid')) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    tracking = true;
  }, {passive:true});
  modal.addEventListener('touchend', e => {
    if(!tracking) return;
    tracking = false;
    const ch = e.changedTouches[0];
    const dx = ch.clientX - sx;
    const dy = ch.clientY - sy;
    // Diagonal UP-RIGHT (toward the top-right corner):
    //   dx > 40 AND dy < -40  (positive X = right in LTR coords;
    //   negative Y = up). Both must exceed the threshold so this is
    //   a clear, intentional gesture and not random noise.
    if(dx > 40 && dy < -40){
      closeCalendarOverlay();
    }
  }, {passive:true});
})();
function openAddFromLogView(){
  const l=_logViewLead; if(!l) return;
  // Close the log-view first, then open the note modal. This avoids any
  // z-index/stacking confusion where the modal would appear behind the log
  // viewer. We remember which lead we came from so we can reopen the log
  // viewer after the note modal closes.
  _logViewReopenIndex=l.index;
  document.getElementById('log-view-modal').classList.remove('open');
  if(history.state&&history.state.page==='logview') popHistorySilently();
  // Slight delay so the close animation can settle before the new modal opens
  setTimeout(()=>addNote(l.index,l.name), 50);
}
function openEditFromLogView(){
  const l=_logViewLead; if(!l) return;
  document.getElementById('log-edit-name').textContent=l.name+(l.phone?` • ${l.phone}`:'');
  document.getElementById('log-edit-textarea').value=l.note||'';
  document.getElementById('log-edit-modal').classList.add('open');
  history.pushState({page:'logedit'},'');
}
function closeLogEdit(){
  document.getElementById('log-edit-modal').classList.remove('open');
  if(history.state&&history.state.page==='logedit') popHistorySilently();
}
function saveLogEdit(){
  const l=_logViewLead; if(!l) return;
  const txt=document.getElementById('log-edit-textarea').value;
  // OPTIMISTIC: update local state + UI immediately, fire API in background
  l.note=txt;
  closeLogEdit();
  filterLeads();
  if(_logViewLead){_logViewLead.note=txt;openLogView(_logViewLead.index);}

let _entryEditCtx=null;  // {leadIdx, entryIdx}
function openEditEntry(leadIdx,entryIdx){
  const lead=allLeads.find(x=>x.index===leadIdx);
  if(!lead) return;
  const entries=parseEntries(lead.note||'');
  if(entryIdx<0||entryIdx>=entries.length) return;
  _entryEditCtx={leadIdx,entryIdx};
  const lines=entries[entryIdx].split('\n');
  const head=/^\d{2}\/\d{2}\/\d{2}/.test(lines[0].trim())?lines[0]:'';
  const body=head?lines.slice(1).join('\n'):entries[entryIdx];
  document.getElementById('entry-edit-head').textContent=head;
  document.getElementById('entry-edit-text').value=body;
  document.getElementById('entry-edit-modal').style.display='flex';
  history.pushState({page:'entryedit'},'');
}
function closeEditEntry(){
  document.getElementById('entry-edit-modal').style.display='none';
  if(history.state&&history.state.page==='entryedit') popHistorySilently();
  _entryEditCtx=null;
}
async function saveEditEntry(){
  if(!_entryEditCtx) return;
  const {leadIdx,entryIdx}=_entryEditCtx;
  const newBody=document.getElementById('entry-edit-text').value.trim();
  const lead=allLeads.find(x=>x.index===leadIdx);
  if(!lead){closeEditEntry();return;}
  const entries=parseEntries(lead.note||'');
  if(entryIdx<0||entryIdx>=entries.length){closeEditEntry();return;}
  const oldEntry=entries[entryIdx];
  const lines=oldEntry.split('\n');
  const head=/^\d{2}\/\d{2}\/\d{2}/.test(lines[0].trim())?lines[0]:'';
  if(!newBody){
    entries.splice(entryIdx,1);
  } else {
    entries[entryIdx]=head?(head+'\n'+newBody):newBody;
  }
  const newVal=entries.join('\n\n');
  lead.note=newVal; // optimistic
  closeEditEntry();
  // refresh whatever view is open
  if(_logViewLead&&_logViewLead.index===leadIdx) openLogView(leadIdx);
  filterLeads();
  showToast('נשמר','ok');
  // Fire API in background — no spinner, no waiting
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/C${lead.index}?valueInputOption=RAW`;
  const opts={method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[[newVal]]})};
  apiFetch(url,opts).catch(()=>enqueueWrite(url,opts,'עריכת רשומה'));
}

// Days in month, with leap-year handling for February
function daysInMonth(year,month){
  if(month===2){
    const leap=(year%4===0 && year%100!==0) || (year%400===0);
    return leap?29:28;
  }
  return [31,28,31,30,31,30,31,31,30,31,30,31][month-1];
}

// Render the visual calendar grid for the current view month
function renderCalendar(){
  const p=_meetingPick;
  const ym=p.viewYear, mm=p.viewMonth;
  const title=`${HEBREW_MONTHS[mm-1]} ${ym}`;
  document.getElementById('cal-title').textContent=title;
  // Day-of-week of the 1st (0=Sunday, 6=Saturday)
  const firstDow=new Date(ym, mm-1, 1).getDay();
  const total=daysInMonth(ym,mm);
  const today=new Date();
  const todayY=today.getFullYear(), todayM=today.getMonth()+1, todayD=today.getDate();
  const grid=document.getElementById('cal-grid');
  let html='';
  // Pad with empty cells for days before the 1st (so 1st sits in the right column)
  for(let i=0;i<firstDow;i++) html+='<div class="cal-day empty"></div>';
  // Render each day
  for(let d=1; d<=total; d++){
    const isToday=(ym===todayY && mm===todayM && d===todayD);
    const isPast=(ym<todayY) || (ym===todayY && mm<todayM) || (ym===todayY && mm===todayM && d<todayD);
    const isSel=(ym===p.year && mm===p.month && d===p.day);
    const cls=['cal-day'];
    if(isToday) cls.push('today');
    if(isPast) cls.push('past');
    if(isSel) cls.push('selected');
    html+=`<button type="button" class="${cls.join(' ')}" onclick="pickDay(${ym},${mm},${d})">${d}</button>`;
  }
  grid.innerHTML=html;
}

function pickDay(y,m,d){
  _meetingPick.year=y;
  _meetingPick.month=m;
  _meetingPick.day=d;
  // No need to re-render time slots, but the calendar needs to update its
  // .selected highlight.
  renderCalendar();
  syncHiddenInputs();
}

function navMonth(delta){
  const p=_meetingPick;
  p.viewMonth+=delta;
  if(p.viewMonth<1){p.viewMonth=12; p.viewYear--;}
  if(p.viewMonth>12){p.viewMonth=1; p.viewYear++;}
  renderCalendar();
}

// Render the half-hour time slot buttons from 08:00 to 20:00 (inclusive)
function renderTimeSlots(){
  const slots=[];
  for(let h=8; h<=20; h++){
    slots.push({h,m:0});
    if(h<20) slots.push({h,m:30});
  }
  const wrap=document.getElementById('time-slots');
  const pad=n=>String(n).padStart(2,'0');
  wrap.innerHTML=slots.map(s=>{
    const sel=(s.h===_meetingPick.hour && s.m===_meetingPick.minute);
    return `<button type="button" class="time-slot${sel?' selected':''}" onclick="pickTime(${s.h},${s.m})">${pad(s.h)}:${pad(s.m)}</button>`;
  }).join('');
  // Update the "current selection" badge above the slots
  document.getElementById('time-current').textContent=`${pad(_meetingPick.hour)}:${pad(_meetingPick.minute)}`;
}

function pickTime(h,m){
  _meetingPick.hour=h;
  _meetingPick.minute=m;
  // Pre-fill manual inputs with the selected slot, so the user can tweak just
  // the minute (or hour) from there if they need a non-half-hour time.
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('manual-hour').value=pad(h);
  document.getElementById('manual-minute').value=pad(m);
  renderTimeSlots();
  syncHiddenInputs();
}

// Manual time entry — fired on every keystroke. We accept any valid hour+minute.
function onManualTimeChange(){
  const hEl=document.getElementById('manual-hour');
  const mEl=document.getElementById('manual-minute');
  const h=parseInt(hEl.value,10);
  const m=parseInt(mEl.value,10);
  if(isNaN(h)||isNaN(m)) return; // wait until both fields have valid input
  if(h<0||h>23||m<0||m>59) return;
  _meetingPick.hour=h;
  _meetingPick.minute=m;
  // Re-render slot grid so the previously-selected slot is no longer highlighted
  renderTimeSlots();
  // BUT we want to keep the manual input values visible to the user,
  // so re-set them after renderTimeSlots() (which doesn't touch the manual inputs).
  syncHiddenInputs();
}

// Push the current selection to the hidden inputs that saveMeeting reads.
function syncHiddenInputs(){
  const p=_meetingPick;
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('meeting-date').value=`${p.year}-${pad(p.month)}-${pad(p.day)}`;
  document.getElementById('meeting-start').value=`${pad(p.hour)}:${pad(p.minute)}`;
  // Update the "+1h" preview
  let nh=p.hour+1; if(nh>=24) nh-=24;
  document.getElementById('meeting-end-preview').textContent=`${pad(nh)}:${pad(p.minute)}`;
  document.getElementById('time-current').textContent=`${pad(p.hour)}:${pad(p.minute)}`;
}

function recomputeMeetingEnd(){/* compatibility no-op */}
async function saveMeeting(){
  if(!_meetingLead) return;
  const dateIso=document.getElementById('meeting-date').value;
  const startTime=document.getElementById('meeting-start').value;
  if(!dateIso||!startTime){showToast('בחר תאריך ושעה');return;}
  const [h,m]=startTime.split(':').map(s=>parseInt(s,10));
  let nh=h+1, nm=m;
  if(nh>=24) nh-=24;
  const endTime=`${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  // Convert ISO date (yyyy-mm-dd) to dd/mm/yy for display + DATE() formula for the cell
  const [yyyy,mm,dd]=dateIso.split('-').map(s=>parseInt(s,10));
  const lead=_meetingLead;
  const rowNum=lead.index;
  closeMeetingDialog();
  // Also close the underlying call-summary modal if it was open (the user
  // tapped "פגישה" or "תזכורת" from inside the summary). This way after
  // saving they're back at the leads list, not stuck on a stale modal.
  const noteModal=document.getElementById('note-modal');
  if(noteModal && noteModal.classList.contains('open')){
    if(typeof closeModal==='function') closeModal();
  }
  showToast('שומר פגישה...');
  try{
    if(!accessToken){signOut();throw new Error('אין הרשאה');}
    // Use spreadsheets:batchUpdate with updateCells + fields=userEnteredValue.
    // This sets ONLY the cell value — leaves any existing format /
    // conditional formatting intact, AND writes a real DATE/TIME so automation
    // tools like Make can read structured values.
    if(_leadsSheetId===null){
      const r0=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties(sheetId,index)`,
        {headers:{'Authorization':'Bearer '+accessToken}});
      const d0=await r0.json();
      if(d0.error)throw new Error(d0.error.message);
      const first=(d0.sheets||[]).find(s=>s.properties&&s.properties.index===0)||(d0.sheets||[])[0];
      if(!first)throw new Error('לא נמצא גיליון');
      _leadsSheetId=first.properties.sheetId;
    }
    const sheetId=_leadsSheetId;
    const rowIdx=rowNum-1; // 0-based
    // Column choice depends on whether this is a meeting (X/Y/Z) or a
    // reminder (AB/AC/AD). The shape of the write is identical; only the
    // target columns differ.
    const xColIdx=_isReminderMode?27:23; // AB or X
    const yColIdx=_isReminderMode?28:24; // AC or Y
    const zColIdx=_isReminderMode?29:25; // AD or Z
    const body={
      requests:[
        {updateCells:{
          rows:[{values:[{userEnteredValue:{formulaValue:`=DATE(${yyyy},${mm},${dd})`}}]}],
          fields:'userEnteredValue',
          start:{sheetId,rowIndex:rowIdx,columnIndex:xColIdx}
        }},
        {updateCells:{
          rows:[{values:[{userEnteredValue:{formulaValue:`=TIME(${h},${m},0)`}}]}],
          fields:'userEnteredValue',
          start:{sheetId,rowIndex:rowIdx,columnIndex:yColIdx}
        }},
        {updateCells:{
          rows:[{values:[{userEnteredValue:{formulaValue:`=TIME(${nh},${nm},0)`}}]}],
          fields:'userEnteredValue',
          start:{sheetId,rowIndex:rowIdx,columnIndex:zColIdx}
        }}
      ]
    };
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`;
    const res=await fetch(url,{
      method:'POST',
      headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const ddP=String(dd).padStart(2,'0'),mmP=String(mm).padStart(2,'0'),yyP=String(yyyy).slice(2);
    // Update the local lead so the new sub-tab takes effect immediately,
    // without needing to wait for the next loadLeads. We also bump the
    // status to CONTINUE because the lead now belongs in the meeting/
    // reminder sub-tab (which lives under "המשך"). Move the lead to the
    // top of allLeads so it shows up first in its sub-list.
    const ts = Date.now();
    if(lead){
      const dateMs = new Date(yyyy, mm-1, dd, h, m, 0).getTime();
      if(_isReminderMode){
        lead.reminderDateRaw = `${ddP}/${mmP}/${yyyy}`;
        lead.reminderDateMs = dateMs;
        lead.lastSubTab = 'reminder';
      } else {
        lead.meetingDateRaw = `${ddP}/${mmP}/${yyyy}`;
        lead.meetingDateMs = dateMs;
        lead.lastSubTab = 'meeting';
      }
      // Make sure status is CONTINUE so it shows up in the המשך tab
      if(lead.status !== STATUS_CONTINUE){
        lead.status = STATUS_CONTINUE;
        // Persist the status change in the background
        const urlV = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/V${rowNum}?valueInputOption=RAW`;
        const optsV = {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({values:[[STATUS_CONTINUE]]})};
        apiFetch(urlV, optsV).catch(()=>enqueueWrite(urlV, optsV, 'סטטוס ליד'));
      }
      // Bump the move map so the lead floats to the top of its sub-list
      const moves = loadMovesMap();
      moves[rowNum] = ts;
      saveMovesMap(moves);
      lead.movedAt = ts;
    }
    filterLeads();
    // Both flows fire the same webhook. The "type" field lets Make route the
    // payload to the right branch (Calendar event "פגישה" vs "תזכורת",
    // optionally WhatsApp for meetings only, etc).
    // Build full ISO datetime strings — Google Calendar's API needs
    // start/end in ISO 8601 format (e.g. "2026-05-01T10:00:00+03:00").
    // We send both raw fields (date / startTime / endTime) and the
    // pre-built ISO strings so Make can use whichever it prefers without
    // needing a date-format formula module.
    const tzOffsetMin = -new Date().getTimezoneOffset();
    const tzSign = tzOffsetMin >= 0 ? '+' : '-';
    const tzHH = String(Math.floor(Math.abs(tzOffsetMin)/60)).padStart(2,'0');
    const tzMM = String(Math.abs(tzOffsetMin)%60).padStart(2,'0');
    const tz = `${tzSign}${tzHH}:${tzMM}`;
    const isoDate = `${yyyy}-${mmP}-${ddP}`;
    const startIso = `${isoDate}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00${tz}`;
    const endIso   = `${isoDate}T${endTime}:00${tz}`;

    const payload={
      type:_isReminderMode?'reminder':'meeting',
      rowNum,
      name:lead.name||'',
      phone:lead.phone||'',
      date:`${ddP}/${mmP}/${yyyy}`,
      startTime:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`,
      endTime:`${endTime}:00`,
      // ISO 8601 — drop these straight into Google Calendar's "Start" /
      // "End" fields in your Make scenario and you're done.
      start:startIso,
      end:endIso,
      timezone:'Asia/Jerusalem'
    };
    if(_isReminderMode){
      showToast(`תזכורת נקבעה ${ddP}/${mmP}/${yyP} ${startTime}`,'ok');
      // Capture the optional short note typed in the reminder-note field.
      // It's shown in the reminders list and in the system notification body.
      const noteEl=document.getElementById('reminder-note');
      const reminderNote=(noteEl?noteEl.value:'').trim();
      // Store locally so we can fire a notification 5 minutes before the
      // reminder time, even if offline. The "when" timestamp is in millis.
      const whenDate=new Date(yyyy, mm-1, dd, h, m, 0);
      addLocalReminder({
        leadIdx:rowNum,
        name:lead.name||'',
        phone:lead.phone||'',
        when:whenDate.getTime(),
        note:reminderNote,
