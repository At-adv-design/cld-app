<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#3a3a48"/>
<title>תיק שלי — אבי טל ושות׳</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="../icon.png"/>
<link rel="apple-touch-icon" href="../icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root,:root[data-theme="parchment"]{--slate:#3a3a48;--slate2:#2c2c38;--red:#b01010;--red-bg:#FDECEC;--red-border:#f5c0c0;--green:#1A7A45;--green-bg:#E8F5EE;--green-border:#bfe0cd;--orange:#C75B12;--orange-bg:#FCF0E5;--orange-border:#f4cda1;--blue:#1A5F9E;--blue-bg:#E5F0FB;--bg:#FAF9F5;--white:#FFFFFF;--border:#D9D6CA;--muted:#6B6A65;--text:#1F1E1B;}
:root[data-theme="dark"]{--slate:#9A9AAB;--slate2:#7B7B8A;--red:#E04444;--red-bg:#3A2222;--red-border:#5C2D2D;--green:#5BB37D;--green-bg:#1F2E27;--green-border:#2F4A3B;--orange:#D88248;--orange-bg:#3B2D1F;--orange-border:#5C4528;--blue:#5A9FE0;--blue-bg:#1F2C3B;--bg:#1F1E1C;--white:#2A2A28;--border:#3A3A36;--muted:#A8A6A0;--text:#F5F4EE;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.header{background:var(--white);height:96px;padding:0 16px 0 40px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid var(--border);}
.header-spacer{height:96px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.hdr-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:0;width:26px;height:26px;font-size:11px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-btn svg{width:14px;height:14px;}
.hdr-count{font-size:10px;color:var(--text);font-weight:600;background:var(--bg);border:1px solid var(--border);padding:0 9px;height:26px;display:inline-flex;align-items:center;flex-shrink:0;}
.header img{height:80px;object-fit:contain;}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;background:var(--bg);}
.login-card{background:var(--white);border:1px solid var(--border);padding:30px 24px;max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;}
.login-card .logo{height:80px;object-fit:contain;align-self:center;margin-bottom:6px;background:transparent;border:none;border-radius:0;box-shadow:none;}
.login-card h1{font-size:18px;font-weight:700;text-align:center;color:var(--text);}
.login-card p{font-size:13px;color:var(--muted);text-align:center;font-weight:500;line-height:1.5;}
.login-input{background:var(--bg);border:1px solid var(--border);padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);direction:rtl;}
.login-input:focus{outline:none;border-color:var(--slate);background:var(--white);}
.login-btn{background:var(--slate);color:#fff;border:1px solid var(--slate);padding:13px 0;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-error{font-size:12px;color:var(--red);text-align:center;font-weight:600;background:var(--red-bg);border:1px solid var(--red-border);padding:8px;display:none;}
.login-error.show{display:block;}
.main{padding:16px;max-width:600px;margin:0 auto;}
.welcome-card{background:var(--white);border:1px solid var(--border);padding:18px 16px;margin-bottom:14px;}
.welcome-card h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.welcome-card p{font-size:12px;color:var(--muted);font-weight:500;line-height:1.5;}
/* Accordion sections — replaces the old tabs. */
.acc-section{background:var(--white);border:1px solid var(--border);margin-bottom:8px;}
.acc-header{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:14px 16px;background:transparent;border:none;cursor:pointer;
  font-family:inherit;color:var(--text);
  border-bottom:1px solid transparent;transition:border-color .15s;
}
.acc-section.open .acc-header{border-bottom-color:var(--border);}
.acc-chev{font-size:12px;color:var(--muted);width:14px;text-align:center;}
.acc-title{flex:1;font-size:14px;font-weight:700;text-align:right;}
.acc-badge{
  display:inline-block;background:var(--red);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;min-width:22px;text-align:center;
}
.acc-badge.zero{background:var(--green);}
.acc-body{padding:14px 14px 16px;}

/* Report grid — three states: available, locked (date hasn't arrived),
   done (already submitted). Disabled buttons are visibly faded. */
.cat-tabs{display:flex;gap:0;background:var(--white);border:1px solid var(--border);margin-bottom:14px;}
.cat-tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:transparent;border-right:1px solid var(--border);border-top:none;border-left:none;font-family:inherit;}
.cat-tab:last-child{border-right:none;}
.cat-tab.active{color:var(--slate);border-bottom-color:var(--slate);font-weight:700;}
.cat-tab .badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;margin-inline-start:4px;min-width:14px;}
.cat-tab .badge.zero{background:var(--green);}
.reports-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0;}
.report-btn{background:var(--white);border:1px solid var(--border);padding:14px 8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text);transition:all .12s;}
.report-btn:not(:disabled):active{transform:scale(.96);background:var(--bg);}
.report-btn .num{font-size:22px;font-weight:700;color:var(--slate);}
.report-btn .lbl{font-size:11px;font-weight:600;color:var(--muted);}
.report-btn .date{font-size:10px;color:var(--text);font-weight:700;}
.report-btn .sub{font-size:10px;}
/* Locked: date hasn't arrived yet — visibly grey, not clickable */
.report-btn.locked{
  opacity:.45;cursor:not-allowed;background:var(--bg);
}
.report-btn.locked .num{color:var(--muted);}
/* Done: report already submitted — faded grey with a checkmark */
.report-btn.done{
  opacity:.5;cursor:not-allowed;background:var(--bg);
  color:var(--muted);
}
.report-btn.done .num{color:var(--muted);}
.report-btn.done .date{color:var(--muted);font-weight:600;}
.report-btn.done .sub{color:var(--green);font-weight:700;}
.report-back-btn{background:transparent;border:none;color:var(--slate);padding:0 0 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;}
.req-item{background:var(--white);border:1px solid var(--border);padding:14px;margin-bottom:8px;}
.req-row-top{display:flex;align-items:flex-start;gap:10px;}
.req-text{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--text);line-height:1.45;padding-top:6px;}
.req-actions{display:flex;gap:6px;flex-shrink:0;}
.req-btn{background:var(--white);border:1px solid var(--border);width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--slate);font-family:inherit;padding:0;transition:all .12s;}
.req-btn:active{transform:scale(.92);background:var(--bg);}
.req-btn:disabled{opacity:.5;cursor:not-allowed;}
.req-btn svg{width:18px;height:18px;}
.req-btn.has-help{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.req-btn.uploaded{background:var(--green);color:#fff;border-color:var(--green);}
.req-status{font-size:11px;font-weight:700;padding:3px 8px;margin-top:8px;display:inline-block;}
.req-status.pending{color:var(--orange);background:var(--orange-bg);border:1px solid var(--orange-border);}
.req-status.uploaded{color:var(--blue);background:var(--blue-bg);}
.req-status.approved{color:var(--green);background:var(--green-bg);border:1px solid var(--green-border);}
.req-status.rejected{color:var(--red);background:var(--red-bg);border:1px solid var(--red-border);}
/* Rejection reason — shown below the rejected status pill so the
   customer knows exactly why their previous upload was declined. */
.rej-reason{
  margin-top:6px;font-size:12px;color:var(--text);
  background:var(--red-bg);border:1px solid var(--red-border);
  padding:8px 10px;line-height:1.5;
  white-space:pre-wrap;word-break:break-word;
}
.rej-reason-label{
  display:inline-block;font-weight:700;color:var(--red);margin-inline-end:4px;
}
.req-files{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
.req-file-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:4px 8px;align-self:flex-start;font-weight:600;}
.req-file-pill svg{width:12px;height:12px;color:var(--slate);}
.req-file-pill .x{margin-inline-start:6px;cursor:pointer;color:var(--red);font-weight:700;}
.req-file-pill a{color:var(--blue);text-decoration:none;}
.req-question{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.req-textarea{width:100%;min-height:60px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);font-size:13px;color:var(--text);font-family:inherit;direction:rtl;resize:vertical;}
.req-textarea:focus{outline:none;border-color:var(--slate);background:var(--white);}
.req-save-btn{align-self:flex-start;background:var(--slate);color:#fff;border:1px solid var(--slate);padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
input[type="file"]{display:none;}
.empty{text-align:center;padding:40px 16px;color:var(--muted);background:var(--white);border:1px solid var(--border);}
.empty svg{width:48px;height:48px;color:var(--border);margin:0 auto 12px;display:block;}
.empty-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text);}
.empty-text{font-size:12px;color:var(--muted);}
.help-modal{position:fixed;inset:0;background:rgba(26,26,40,0.5);z-index:380;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.help-modal.open{display:flex;}
.help-sheet{background:var(--white);width:100%;max-width:480px;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));max-height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.help-handle{width:36px;height:3px;background:var(--border);margin:0 auto 4px;}
.help-title{font-size:14px;font-weight:700;color:var(--text);}
.help-text{font-size:13px;color:var(--text);line-height:1.6;background:var(--bg);border:1px solid var(--border);padding:14px;white-space:pre-wrap;word-break:break-word;}
.help-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0;font-style:italic;}
.help-close{background:var(--slate);color:#fff;border:1px solid var(--slate);padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;align-self:flex-end;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slate);color:#fff;padding:10px 18px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{opacity:1;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
.section-header{font-size:12px;font-weight:700;color:var(--muted);margin:14px 4px 8px;}
.spinner-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:none;align-items:center;justify-content:center;z-index:500;}
.spinner-overlay.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--slate);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <img src="../logo.png" alt="אבי טל ושות׳" class="logo" onerror="this.style.display='none'"/>
    <h1>תיק שלי</h1>
    <p>הזן את שם המשתמש והסיסמה שקיבלת מהמשרד.</p>
    <input type="text" id="login-username" class="login-input" placeholder="שם משתמש (תעודת זהות)" inputmode="numeric" maxlength="9" autocomplete="username"/>
    <input type="password" id="login-password" class="login-input" placeholder="סיסמה" autocomplete="current-password"/>
    <button class="login-btn" id="login-btn" onclick="tryLogin()">כניסה</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="hdr-right">
      <button class="hdr-btn" onclick="logout()" title="יציאה">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
      <div class="hdr-count" id="user-name-display">לקוח</div>
    </div>
    <img src="../logo.png" alt="אבי טל ושות׳" onerror="this.style.display='none'"/>
  </div>
  <div class="header-spacer"></div>
  <div class="main">
    <div class="welcome-card">
      <h2 id="welcome-name">שלום</h2>
      <p>כאן תוכל להעלות מסמכים שביקשנו ולהשיב על שאלות מהמשרד.</p>
    </div>
    <div class="cat-tabs">
      <button class="cat-tab active" id="cat-reports" onclick="switchCat('reports')">מסמכי דוחות<span class="badge zero" id="cnt-reports">0</span></button>
      <button class="cat-tab" id="cat-docs" onclick="switchCat('docs')">השלמת מסמכים<span class="badge zero" id="cnt-docs">0</span></button>
      <button class="cat-tab" id="cat-info" onclick="switchCat('info')">השלמת פרטים<span class="badge zero" id="cnt-info">0</span></button>
    </div>
    <div id="content-area"></div>
  </div>
  <input type="file" id="file-input" accept="image/*,application/pdf"/>
  <input type="file" id="camera-input" accept="image/*" capture="environment"/>
</div>

<div class="help-modal" id="help-modal">
  <div class="help-sheet">
    <div class="help-handle"></div>
    <div class="help-title" id="help-title">הסבר</div>
    <div id="help-body"></div>
    <button class="help-close" onclick="closeHelp()">סגור</button>
  </div>
</div>

<!-- File name confirmation modal — shown after the user chooses a file.
     Pre-filled with the requirement description; user can edit. -->
<div class="help-modal" id="name-modal">
  <div class="help-sheet">
    <div class="help-handle"></div>
    <div class="help-title">שם הקובץ לפני שליחה</div>
    <div style="font-size:11px;color:var(--muted);font-weight:600;line-height:1.5">דרישה: <span id="name-modal-text" style="color:var(--text);font-weight:700"></span></div>
    <input type="text" id="name-modal-input" class="login-input" style="font-size:13px" placeholder="שם הקובץ"/>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="help-close" style="background:var(--white);color:var(--slate);border-color:var(--border);flex:1" onclick="cancelNameModal()">ביטול</button>
      <button class="help-close" style="flex:1" onclick="confirmNameAndUpload()">שלח</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="spinner-overlay" class="spinner-overlay"><div class="spinner"></div></div>

<script>
'use strict';

/* ============================================================
   CONFIG — paste your Apps Script Web App URL below.
   Until you do, the app runs in DEMO mode.
   ============================================================ */
const CONFIG = {
  API_URL: '' // ← e.g. 'https://script.google.com/macros/s/AKfy.../exec'
};

const _SVG=(p,sz=16)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:${sz}px;height:${sz}px;display:block">${p}</svg>`;
const ICON={
  camera: _SVG('<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',18),
  upload: _SVG('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',18),
  question:_SVG('<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>',18),
  paper:  _SVG('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',12),
  check:  _SVG('<polyline points="20 6 9 17 4 12"/>',18),
  empty:  _SVG('<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',48),
};

let currentUser=null;
let requests=[];
let currentCategory='reports';
let currentReportNum=null;
// Track which accordion sections are open. All start closed so the
// customer sees just three big tappable headers and isn't overwhelmed.
const _sectionOpen = {reports:false, docs:false, info:false};
// Per-report due dates and statuses, fetched together with requirements.
let _reportInfo = []; // [{num, dateMs, dateText, status}, ...]
let _activeReqId=null;
const LS_USER='at_customer_session_v2';

async function apiCall(action, payload){
  if(!CONFIG.API_URL) throw new Error('האפליקציה לא מוגדרת — צור קשר עם המשרד');
  const body = JSON.stringify(Object.assign({action}, payload));
  const res = await fetch(CONFIG.API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body,
  });
  if(!res.ok) throw new Error('שגיאת רשת — נסה שוב');
  let data;
  try{ data = await res.json(); }
  catch(_){ throw new Error('תגובה לא תקינה מהשרת'); }
  if(!data.ok) throw new Error(data.error || 'שגיאה');
  return data;
}

async function tryLogin(){
  const u=document.getElementById('login-username').value.trim();
  const p=document.getElementById('login-password').value.trim();
  const err=document.getElementById('login-error');
  err.classList.remove('show');
  if(!u || !p){ err.textContent='הזן שם משתמש וסיסמה'; err.classList.add('show'); return; }
  if(!CONFIG.API_URL){
    if(!/^\d{9}$/.test(u)){ err.textContent='מספר זהות חייב להכיל 9 ספרות'; err.classList.add('show'); return; }
    if(!/^\d{6}$/.test(p)){ err.textContent='סיסמה חייבת להכיל 6 ספרות'; err.classList.add('show'); return; }
    currentUser={rowNum:0, name:'לקוח לדוגמה (דמו)', username:u, token:''};
    localStorage.setItem(LS_USER, JSON.stringify(currentUser));
    showApp(); return;
  }
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='בודק...';
  try{
    const data = await apiCall('login', {username:u, password:p});
    currentUser = data.user;
    localStorage.setItem(LS_USER, JSON.stringify(currentUser));
    showApp();
  }catch(e){
    err.textContent = e.message || 'שגיאה';
    err.classList.add('show');
  }finally{
    btn.disabled=false; btn.textContent='כניסה';
  }
}

function logout(){
  if(!confirm('להתנתק מהאפליקציה?')) return;
  localStorage.removeItem(LS_USER);
  currentUser=null; requests=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
}

async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('welcome-name').textContent='שלום, '+(currentUser.name||'');
  document.getElementById('user-name-display').textContent=currentUser.name||'';
  await loadRequestsFromServer();
}

async function loadRequestsFromServer(){
  if(!CONFIG.API_URL){
    requests=buildDemoRequests();
    // Demo mode: make all 6 reports available with friendly fake dates
    // so the user sees the UI work without needing the live backend.
    const now=new Date();
    _reportInfo = [];
    for(let i=0;i<6;i++){
      const d=new Date(now.getFullYear(), now.getMonth()-2+i, 1);
      _reportInfo.push({
        num: i+1,
        dateMs: d.getTime(),
        dateText: ('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(),
        status: '',
      });
    }
    renderAll(); return;
  }
  showSpinner(true);
  try{
    const data = await apiCall('getRequests', {token: currentUser.token});
    requests = [];
    (data.reports || []).forEach(r => {
      const reportNum = r.report || 1;
      requests.push(Object.assign({}, r, {category:'reports', report:reportNum, kind:'doc'}));
    });
    (data.docs || []).forEach(r => {
      requests.push(Object.assign({}, r, {category:'docs', kind:'doc'}));
    });
    (data.info || []).forEach(r => {
      requests.push(Object.assign({}, r, {category:'info', kind:'question'}));
    });
    if(data.name) currentUser.name = data.name;
    _reportInfo = data.reportInfo || [];
    document.getElementById('welcome-name').textContent='שלום, '+(currentUser.name||'');
    document.getElementById('user-name-display').textContent=currentUser.name||'';
    renderAll();
  }catch(e){
    showToast(e.message||'שגיאה בטעינה','err');
    if((e.message||'').includes('פג תוקף')){ logout(); return; }
  }finally{
    showSpinner(false);
  }
}

function buildDemoRequests(){
  const tmpl=['תלושי שכר 2 חודשים אחרונים','דפי חשבון בנק','חשבונות חשמל וארנונה'];
  const list=[];
  for(let r=1;r<=6;r++){
    tmpl.forEach((t,i)=>list.push({id:`r${r}-${i}`,category:'reports',report:r,kind:'doc',text:t,explanation:'',status:'pending',files:[]}));
  }
  list.push({id:'d1',category:'docs',kind:'doc',text:'תעודת זהות',explanation:'',status:'pending',files:[]});
  list.push({id:'i1',category:'info',kind:'question',text:'מה המצב המשפחתי?',explanation:'',status:'pending',answer:''});
  return list;
}

/* Toggle an accordion section open/closed. Closing a section also
   closes any drilled-in report view. */
function toggleSection(cat){
  _sectionOpen[cat] = !_sectionOpen[cat];
  if(!_sectionOpen[cat] && cat==='reports') currentReportNum = null;
  renderAll();
}

function renderAll(){
  // Update tab counts
  ['reports','docs','info'].forEach(cat=>{
    const pending = requests.filter(r=>r.category===cat && (r.status==='pending'||r.status==='rejected')).length;
    const el = document.getElementById('cnt-'+cat);
    if(el){
      el.textContent = pending;
      el.classList.toggle('zero', pending===0);
    }
  });
  // Render the active tab's content
  const area = document.getElementById('content-area');
  if(!area) return;
  if(currentCategory==='reports'){
    area.innerHTML = currentReportNum ? renderReportItems() : renderReportsGrid();
  } else {
    area.innerHTML = renderFlatList(currentCategory);
  }
}

/* Switch which category tab is active. */
function switchCat(cat){
  currentCategory = cat;
  currentReportNum = null;
  ['reports','docs','info'].forEach(c=>{
    const el = document.getElementById('cat-'+c);
    if(el) el.classList.toggle('active', c===cat);
  });
  renderAll();
}

/* Status helpers — does this report have a due date that's already arrived?
   Has it already been marked "בוצע" (done)? */
function _reportInfoFor(n){
  return (_reportInfo || []).find(x => x && x.num === n) || {num:n, dateMs:null, dateText:'', status:''};
}
function _reportIsDone(info){
  // The lawyer marks "בוצע" when a report has been submitted. We treat
  // anything non-empty as "done" to be safe (matches the insolvency app).
  return !!(info && (info.status||'').trim());
}
function _reportIsAvailable(info){
  if(!info) return false;
  if(_reportIsDone(info)) return false;
  // No date set → not yet relevant; lock it.
  if(!info.dateMs) return false;
  return Date.now() >= info.dateMs;
}

/* Format a date as "חודש שנה" (e.g. "מאי 2026") for the report cards. */
const _HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
function _formatReportDate(info){
  if(!info || !info.dateMs) return info && info.dateText ? info.dateText : '—';
  const d = new Date(info.dateMs);
  return _HEB_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function renderReportsGrid(){
  const cells = [1,2,3,4,5,6].map(n=>{
    const info = _reportInfoFor(n);
    const items = requests.filter(r=>r.category==='reports' && r.report===n);
    const pending = items.filter(r=>r.status==='pending'||r.status==='rejected').length;
    const done = _reportIsDone(info);
    const available = _reportIsAvailable(info);
    const dateLbl = _formatReportDate(info);
    let cls = 'report-btn';
    if(done) cls += ' done';
    else if(!available) cls += ' locked';
    const click = (done || !available) ? '' : `onclick="openReport(${n})"`;
    const subLine = done
      ? '✓ הוגש'
      : (!available
          ? 'טרם הגיע המועד'
          : (items.length ? `${pending}/${items.length} פתוחים` : 'אין מסמכים'));
    return `<button class="${cls}" ${click} ${(done||!available)?'disabled':''}>
      <span class="num">${n}</span>
      <span class="lbl">דוח ${n}</span>
      <span class="lbl date">${dateLbl}</span>
      <span class="lbl sub">${subLine}</span>
    </button>`;
  }).join('');
  return `<div class="section-header" style="margin-top:0">בחר דוח להעלאת מסמכים</div>
    <div class="reports-grid">${cells}</div>`;
}

function openReport(n){
  const info = _reportInfoFor(n);
  if(_reportIsDone(info) || !_reportIsAvailable(info)) return; // safety
  currentReportNum=n; renderAll();
  // Scroll the accordion section into view nicely
  setTimeout(()=>{
    const el=document.querySelector('.acc-section.open');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}
function closeReport(){ currentReportNum=null; renderAll(); }

function renderReportItems(){
  const info = _reportInfoFor(currentReportNum);
  const items = requests.filter(r=>r.category==='reports' && r.report===currentReportNum);
  const dateLbl = _formatReportDate(info);
  if(!items.length){
    return `<button class="report-back-btn" onclick="closeReport()">‹ חזרה לרשימת הדוחות</button>
      <div class="empty">${ICON.empty}<div class="empty-title">אין מסמכים נדרשים לדוח ${currentReportNum}</div></div>`;
  }
  return `<button class="report-back-btn" onclick="closeReport()">‹ חזרה לרשימת הדוחות</button>
    <div class="section-header" style="margin-top:0">מסמכים לדוח ${currentReportNum} · ${dateLbl}</div>
    ${items.map(renderRequestItem).join('')}`;
}

function renderFlatList(cat){
  const items = requests.filter(r=>r.category===cat);
  if(!items.length){
    return `<div class="empty">${ICON.empty}<div class="empty-title">אין פריטים בקטגוריה זו</div><div class="empty-text">הכל מעודכן 👌</div></div>`;
  }
  const order = {pending:0, rejected:1, uploaded:2, approved:3};
  items.sort((a,b)=>(order[a.status]||9)-(order[b.status]||9));
  return items.map(renderRequestItem).join('');
}

function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

function renderRequestItem(r){
  const statusLbl={
    pending:'<span class="req-status pending">⏳ ממתין</span>',
    uploaded:'<span class="req-status uploaded">✓ הועלה — ממתין לאישור</span>',
    approved:'<span class="req-status approved">✓ אושר</span>',
    rejected:'<span class="req-status rejected">✗ נדחה — נא להעלות שוב</span>',
  }[r.status] || '';
  // If rejected, show the rejection reason that the office wrote.
  // The reason comes from the sheet (rejectionReason field set by the
  // approve/reject flow in the insolvency app).
  const rejReason = (r.status==='rejected' && (r.rejectionReason||'').trim())
    ? `<div class="rej-reason"><span class="rej-reason-label">סיבת הדחייה:</span> ${esc(r.rejectionReason)}</div>`
    : '';
  const hasHelp = !!(r.explanation||'').trim();
  const helpBtn = `<button class="req-btn ${hasHelp?'has-help':''}" onclick="openHelp('${r.id}')" title="${hasHelp?'יש הסבר':'אין הסבר'}">${ICON.question}</button>`;

  if(r.kind==='question'){
    return `<div class="req-item">
      <div class="req-row-top">
        <div class="req-text">${esc(r.text)}</div>
        <div class="req-actions">${helpBtn}</div>
      </div>
      ${statusLbl}
      ${rejReason}
      <div class="req-question">
        <textarea class="req-textarea" id="ans-${r.id}" placeholder="כתוב את התשובה כאן..." ${r.status==='approved'?'readonly':''}>${esc(r.answer||'')}</textarea>
        ${r.status!=='approved' ? `<button class="req-save-btn" onclick="saveAnswer('${r.id}')">שלח תשובה</button>` : ''}
      </div>
    </div>`;
  }
  const filesList = (r.files||[]).map(f=>{
    const link = f._uploading
      ? `<span style="color:var(--blue);font-style:italic">${esc(f.name)}</span><span class="upl-spinner" style="margin-inline-start:6px;display:inline-block;width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite"></span>`
      : (f.url ? `<a href="${esc(f.url)}" target="_blank">${esc(f.name)}</a>` : esc(f.name));
    return `<span class="req-file-pill">${ICON.paper}<span>${link}</span>${(r.status!=='approved' && !f._uploading) ? `<span class="x" onclick="removeFile('${r.id}','${esc(f.id||f.name||'')}')">✕</span>` : ''}</span>`;
  }).join('');
  return `<div class="req-item">
    <div class="req-row-top">
      <div class="req-text">${esc(r.text)}</div>
      <div class="req-actions">
        ${helpBtn}
        <button class="req-btn" onclick="pickCamera('${r.id}')" title="צלם תמונה">${ICON.camera}</button>
        <button class="req-btn ${(r.files||[]).length?'uploaded':''}" onclick="pickFile('${r.id}')" title="העלה קובץ">${(r.files||[]).length?ICON.check:ICON.upload}</button>
      </div>
    </div>
    ${statusLbl}
    ${rejReason}
    ${filesList ? `<div class="req-files">${filesList}</div>` : ''}
  </div>`;
}

function pickFile(reqId){ _activeReqId=reqId; document.getElementById('file-input').click(); }
function pickCamera(reqId){ _activeReqId=reqId; document.getElementById('camera-input').click(); }

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const result = r.result || '';
      const idx = result.indexOf(',');
      resolve(idx>=0 ? result.slice(idx+1) : result);
    };
    r.onerror=()=>reject(new Error('שגיאה בקריאת הקובץ'));
    r.readAsDataURL(file);
  });
}

/* Compress an image file before upload. Reduces transfer time hugely
   (a typical 3-5 MB phone photo shrinks to ~600 KB at visually-lossless
   quality). PDFs and other non-images are returned unchanged. Files
   already under 500 KB are also returned as-is — not worth compressing. */
async function compressImageIfNeeded(file){
  if(!file) return file;
  const isImage = /^image\//i.test(file.type || '');
  if(!isImage) return file;             // PDFs etc — pass through
  if(file.size < 500*1024) return file; // already small enough

  const MAX_DIM = 1920;     // longest side cap (1920px is plenty for documents)
  const QUALITY = 0.82;     // JPEG quality (0.82 ≈ visually lossless for docs)

  // Decode the image
  const dataUrl = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('שגיאה בקריאת התמונה'));
    r.readAsDataURL(file);
  });
  const img = await new Promise((res,rej)=>{
    const i=new Image();
    i.onload=()=>res(i);
    i.onerror=()=>rej(new Error('שגיאה בטעינת התמונה'));
    i.src=dataUrl;
  });

  // Compute target dimensions (preserve aspect ratio)
  let {width, height} = img;
  if(width > MAX_DIM || height > MAX_DIM){
    if(width >= height){
      height = Math.round(height * MAX_DIM / width);
      width = MAX_DIM;
    } else {
      width = Math.round(width * MAX_DIM / height);
      height = MAX_DIM;
    }
  }

  // Render to canvas
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);

  // Encode as JPEG (smaller than PNG for photos)
  const blob = await new Promise(res=>canvas.toBlob(res, 'image/jpeg', QUALITY));
  if(!blob) return file; // fallback if canvas-to-blob failed
  // Wrap as a File so the rest of the code (filename, mimeType) works
  const newName = (file.name || 'image').replace(/\.[^.]+$/,'') + '.jpg';
  return new File([blob], newName, {type: 'image/jpeg'});
}

/* When a file is chosen (camera or upload), show the user a quick
   confirmation modal with a pre-filled name (the requirement's text).
   They can edit the name if needed, then tap "שלח" to actually upload. */
let _pendingUpload = null; // {file, req}

async function handleFileChosen(e){
  const f=e.target.files && e.target.files[0];
  e.target.value='';
  if(!f || !_activeReqId) return;
  const r=requests.find(x=>x.id===_activeReqId);
  if(!r) return;
  // Open the name-confirmation modal pre-filled with the req description.
  // Strip dangerous chars and trim — the user can edit.
  const cleanText = (r.text||'').replace(/[\/\\:*?"<>|]/g,' ').replace(/\s+/g,' ').trim();
  _pendingUpload = {file:f, req:r};
  const m = document.getElementById('name-modal');
  document.getElementById('name-modal-text').textContent = r.text || '';
  document.getElementById('name-modal-input').value = cleanText || f.name;
  m.classList.add('open');
  setTimeout(()=>document.getElementById('name-modal-input').focus(), 80);
}

function cancelNameModal(){
  document.getElementById('name-modal').classList.remove('open');
  _pendingUpload = null;
}

async function confirmNameAndUpload(){
  if(!_pendingUpload) return;
  const {file, req} = _pendingUpload;
  let chosenName = document.getElementById('name-modal-input').value.trim();
  if(!chosenName){ showToast('יש להזין שם לקובץ','err'); return; }
  // Preserve the original extension if the user removed it
  const orig = file.name || '';
  const dot = orig.lastIndexOf('.');
  const origExt = dot >= 0 ? orig.slice(dot) : '';
  if(origExt && !chosenName.toLowerCase().endsWith(origExt.toLowerCase())){
    chosenName += origExt;
  }
  document.getElementById('name-modal').classList.remove('open');
  _pendingUpload = null;

  if(!CONFIG.API_URL){
    if(!req.files) req.files=[];
    req.files.push({name:chosenName});
    req.status='uploaded';
    renderAll();
    showToast('הועלה: '+chosenName,'ok');
    return;
  }

  // Add a temporary "uploading" placeholder that the customer sees
  // immediately. Dismisses the modal and frees them to keep working
  // while the upload proceeds in the background.
  if(!req.files) req.files=[];
  const tempId = 'tmp-' + Date.now() + '-' + Math.floor(Math.random()*1000);
  req.files.push({id: tempId, name: chosenName, _uploading: true});
  if(req.status==='pending' || req.status==='rejected') req.status='uploaded';
  renderAll();
  showToast('מעלה ברקע — אפשר להמשיך','ok');

  // Run the actual upload async, without blocking the UI.
  (async ()=>{
    try{
      // Compress images so the round-trip is much faster. Documents
      // (PDFs, etc.) pass through unchanged.
      const fileToSend = await compressImageIfNeeded(file);
      const dataBase64 = await fileToBase64(fileToSend);
      const payload = {
        token: currentUser.token,
        category: req.category,
        reqId: req.id,
        reportNum: req.report || null,
        filename: chosenName,
        mimeType: fileToSend.type || 'application/octet-stream',
        dataBase64,
      };
      const data = await apiCall('uploadFile', payload);
      // Replace the placeholder with the real file entry
      const slot = req.files.find(f => f.id === tempId);
      if(slot){
        slot.id = data.fileId;
        slot.name = data.fileName;
        slot.url = data.fileUrl;
        delete slot._uploading;
      }
      renderAll();
      showToast('הועלה: '+chosenName,'ok');
    }catch(err){
      // Remove the placeholder and show an error
      req.files = (req.files||[]).filter(f => f.id !== tempId);
      if(!req.files.length && req.status==='uploaded') req.status='pending';
      renderAll();
      showToast(err.message||'שגיאה בהעלאה','err');
    }
  })();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('file-input').addEventListener('change', handleFileChosen);
  document.getElementById('camera-input').addEventListener('change', handleFileChosen);
});

async function removeFile(reqId, fileId){
  if(!confirm('למחוק את הקובץ?')) return;
  const r=requests.find(x=>x.id===reqId);
  if(!r) return;
  if(!CONFIG.API_URL){
    r.files = (r.files||[]).filter(f=>(f.id||f.name)!==fileId);
    if(!r.files.length && r.status==='uploaded') r.status='pending';
    renderAll(); return;
  }
  showSpinner(true);
  try{
    await apiCall('removeFile', {token:currentUser.token, category:r.category, reqId:r.id, fileId});
    r.files = (r.files||[]).filter(f=>f.id!==fileId);
    if(!r.files.length && r.status==='uploaded') r.status='pending';
    renderAll();
    showToast('נמחק','ok');
  }catch(e){
    showToast(e.message||'שגיאה במחיקה','err');
  }finally{
    showSpinner(false);
  }
}

async function saveAnswer(reqId){
  const r=requests.find(x=>x.id===reqId);
  if(!r) return;
  const ta=document.getElementById('ans-'+reqId);
  if(!ta) return;
  const val=ta.value.trim();
  if(!val){ showToast('הזן תשובה','err'); return; }
  if(!CONFIG.API_URL){
    r.answer=val; r.status='uploaded';
    renderAll();
    showToast('התשובה נשלחה','ok');
    return;
  }
  showSpinner(true);
  try{
    await apiCall('submitAnswer', {token:currentUser.token, reqId:r.id, answer:val});
    r.answer=val; r.status='uploaded';
    renderAll();
    showToast('התשובה נשלחה','ok');
  }catch(e){
    showToast(e.message||'שגיאה','err');
  }finally{
    showSpinner(false);
  }
}

function openHelp(reqId){
  const r=requests.find(x=>x.id===reqId);
  if(!r) return;
  document.getElementById('help-title').textContent=r.text||'הסבר';
  const body=document.getElementById('help-body');
  if((r.explanation||'').trim()){
    body.innerHTML=`<div class="help-text">${esc(r.explanation)}</div>`;
  } else {
    body.innerHTML=`<div class="help-empty">לא הוסף הסבר נוסף לפריט זה.</div>`;
  }
  document.getElementById('help-modal').classList.add('open');
}
function closeHelp(){ document.getElementById('help-modal').classList.remove('open'); }
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('help-modal').addEventListener('click', e=>{
    if(e.target.id==='help-modal') closeHelp();
  });
});

let _toastTimer=null;
function showToast(msg, kind=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(kind?(' '+kind):'')+' show';
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'), 2400);
}
function showSpinner(show){ document.getElementById('spinner-overlay').classList.toggle('show', show); }

document.addEventListener('DOMContentLoaded',()=>{
  try{
    const saved=localStorage.getItem(LS_USER);
    if(saved){
      currentUser=JSON.parse(saved);
      showApp();
    }
  }catch(_){}
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
